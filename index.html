<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NMB 2nd Brain</title>
<style>
:root{--navy:#0f1b2d;--navy-light:#1e3150;--gold:#c9a84c;--gold-pale:#f5e9c8;--white:#fff;--offwhite:#f8f6f1;--text:#1a1a2e;--text-muted:#7a8399;--border:#e2ddd4;--success:#4caf7d;--danger:#e05c5c;--warn:#f59e0b;--radius:12px;--shadow:0 4px 24px rgba(15,27,45,.10);--sw:240px;--th:56px;--mth:64px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--offwhite);color:var(--text);min-height:100vh;display:flex;overflow:hidden}
#sidebar{width:var(--sw);background:var(--navy);height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;transition:transform .3s;overflow-y:auto}
.sl{padding:20px 20px 14px;border-bottom:1px solid var(--navy-light)}
.sl .brand{font-size:18px;font-weight:800;color:var(--gold)}
.sl .tag{font-size:10px;color:var(--text-muted);margin-top:2px;letter-spacing:.8px;text-transform:uppercase}
.ns{padding:10px 0 2px}
.nl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);padding:0 20px 5px}
.ni{display:flex;align-items:center;gap:11px;padding:9px 20px;cursor:pointer;color:#a0aec0;font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .2s}
.ni:hover{background:var(--navy-light);color:#fff}
.ni.active{background:var(--navy-light);color:var(--gold);border-left-color:var(--gold)}
.ni .ic{font-size:16px;width:20px;text-align:center}
.sf{margin-top:auto;padding:14px 20px;border-top:1px solid var(--navy-light);font-size:11px;color:var(--text-muted);text-align:center}
#main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{height:var(--th);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.tt{font-size:17px;font-weight:800;color:var(--navy)}
.tr{display:flex;align-items:center;gap:10px}
.tdate{font-size:12px;color:var(--text-muted)}
.av{width:34px;height:34px;border-radius:50%;background:var(--navy);color:var(--gold);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
.hb{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--navy);padding:4px}
#content{flex:1;overflow-y:auto}
.mod{display:none;min-height:100%}
.mod.active{display:block}
.p24{padding:24px;max-width:1100px;margin:0 auto}
.btn{background:var(--navy);color:var(--gold);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn:hover{background:var(--navy-light)}
.btn-g{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);white-space:nowrap}
.btn-g:hover{border-color:var(--navy);color:var(--navy)}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.ch{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ch h3{font-size:14px;font-weight:800;color:var(--navy)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--white);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.sc .l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:5px}
.sc .v{font-size:22px;font-weight:900;color:var(--navy)}
.sc .s{font-size:11px;color:var(--text-muted);margin-top:3px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--offwhite);padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--offwhite)}
.ab{background:none;border:none;cursor:pointer;font-size:12px;padding:3px 4px;border-radius:4px;color:var(--text-muted)}
.ab:hover{background:var(--offwhite);color:var(--navy)}
.er td{text-align:center;padding:24px;color:var(--text-muted)}
.bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.pb{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:4px 0}
.pf{height:100%;border-radius:4px;transition:width .4s}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.mo.show{opacity:1;pointer-events:all}
.md{background:var(--white);border-radius:16px;padding:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;transform:translateY(10px);transition:transform .25s;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo.show .md{transform:translateY(0)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mh h2{font-size:15px;font-weight:800;color:var(--navy)}
.mc{background:none;border:none;font-size:19px;cursor:pointer;color:var(--text-muted)}
.fi{margin-bottom:12px}
.fi label{display:block;font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.fi input,.fi select,.fi textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--white)}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--gold)}
.fi textarea{resize:vertical;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;margin-top:16px}
.ma .bs{flex:1;background:var(--navy);color:var(--gold);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer}
.ma .bs:hover{background:var(--navy-light)}
.ma .bc{background:none;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;color:var(--text-muted);font-weight:600}
#mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#mob-tb{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--mth);background:var(--white);border-top:1px solid var(--border);z-index:90;justify-content:space-around;align-items:center}
.mt{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 6px;cursor:pointer;font-size:9px;color:var(--text-muted);font-weight:600;flex:1;text-align:center}
.mt .ic{font-size:19px}
.mt.active{color:var(--gold)}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin:20px 0}
.dc{background:var(--white);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.dc:hover{transform:translateY(-2px)}
.dch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted)}
.dcv{font-size:26px;font-weight:900;color:var(--navy)}
.dcs{font-size:11px;color:var(--text-muted);margin-top:3px}
.dr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.dw{background:var(--white);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow)}
.dw h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px}
.dli{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.dli:last-child{border-bottom:none}
.dd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #mob-ov.show{display:block}
  #main{margin-left:0}
  #mob-tb{display:flex}
  #content{padding-bottom:var(--mth)}
  .hb{display:block}
  .dr{grid-template-columns:1fr}
  .tdate{display:none}
  #topbar{padding:0 14px}
  .p24{padding:14px}
}
</style>
</head>

<script>
var SUPA='https://wqpkppohxhgolfugpjxp.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxcGtwcG9oeGhnb2xmdWdwanhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDg0MzAsImV4cCI6MjA5MjE4NDQzMH0.1eWxwo6lffeyVRoCW3j6bCQtSYhQYWwBL6FUcrz8FR8';
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_S=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MOD_TITLES={dashboard:'Dashboard',todo:'To-Do & Planner',calendar:'Calendar',twelve:'12 Week Year',fitness:'Fitness Tracker',habits:'Habit Tracker',grocery:'Grocery List',bucketlist:'Bucket List',finance:'Finance',attendance:'Attendance'};

// state
var tasks=[],habits=[],habitLogs={},blItems=[],cycles=[],weekTasks=[];
var groceryLists=[],groceryItems=[];
var fitMeals=[],weightLogs=[],fitnessGoals={};
var calCals=[],calEvents=[];
var finIncome=[],finExpenses=[],finBudgets=[],finSavings=[],finBills=[],finDebts=[],finNW=[],finAccounts=[];
var attJobs=[],attLogs=[];
var annualGoals=[{text:'',color:'#c9a84c'},{text:'',color:'#4caf7d'},{text:'',color:'#7c9de8'}];
var curMod='dashboard';
var todoView='daily',todoGroup='all';
var calView='monthly',calY=new Date().getFullYear(),calM=new Date().getMonth(),calD=new Date().getDate();
var habY=new Date().getFullYear(),habM=new Date().getMonth();
var blFilter='all',blSearch='',blSort='manual';
var fitTab='goals',fitMealDate=todayStr();
var finTab='overview',finY=new Date().getFullYear(),finM=new Date().getMonth();
var attTab='overview',attY=new Date().getFullYear(),attM=new Date().getMonth(),attFJ='all';
var cycIdx=0,activeGrocList=null;
var editIds={task:null,habit:null,bl:null,cycle:null,task12:null};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function peso(n){return '\u20B1'+(+n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return n<10?'0'+n:String(n);}
function fmtDate(s){if(!s)return'';var p=s.split('-');return MONTHS_S[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0];}
function fmtShort(d){return MONTHS_S[d.getMonth()]+' '+d.getDate();}
function hexA(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function isOD(t){if(t.done||!t.due_date)return false;return new Date(t.due_date+'T'+(t.due_time||'23:59'))<new Date();}
function isToday(t){return t.due_date===todayStr();}

function db(path,opts){
  opts=opts||{};
  return fetch(SUPA+'/rest/v1/'+path,{
    method:opts.method||'GET',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:opts.body
  }).then(function(r){return r.text().then(function(t){if(!r.ok)throw new Error(t);return t?JSON.parse(t):[];});});
}

function saveL(){
  var s=[['nmb_tasks',tasks],['nmb_habits',habits],['nmb_bl',blItems],['nmb_cycles',cycles],['nmb_wtasks',weekTasks],['nmb_glists',groceryLists],['nmb_gitems',groceryItems],['nmb_meals',fitMeals],['nmb_wlogs',weightLogs],['nmb_ajobs',attJobs],['nmb_alogs',attLogs]];
  s.forEach(function(x){try{localStorage.setItem(x[0],JSON.stringify(x[1]));}catch(e){}});
  try{localStorage.setItem('nmb_hlogs',JSON.stringify(habitLogs));}catch(e){}
}
function loadL(){
  var s=[['nmb_tasks',tasks],['nmb_habits',habits],['nmb_bl',blItems],['nmb_cycles',cycles],['nmb_wtasks',weekTasks],['nmb_glists',groceryLists],['nmb_gitems',groceryItems],['nmb_meals',fitMeals],['nmb_wlogs',weightLogs],['nmb_ajobs',attJobs],['nmb_alogs',attLogs]];
  s.forEach(function(x){try{var d=JSON.parse(localStorage.getItem(x[0])||'[]');x[1].length=0;d.forEach(function(i){x[1].push(i);});}catch(e){}});
  try{habitLogs=JSON.parse(localStorage.getItem('nmb_hlogs')||'{}');}catch(e){}
  try{fitnessGoals=JSON.parse(localStorage.getItem('nmb_fg')||'{}');}catch(e){}
  try{annualGoals=JSON.parse(localStorage.getItem('nmb_ag')||'null')||annualGoals;}catch(e){}
  try{var cc=JSON.parse(localStorage.getItem('nmb_cals_v2')||'null');if(cc&&cc.length)calCals=cc;}catch(e){}
  cycIdx=cycles.length?cycles.length-1:0;
}

function init(){
  loadL();
  Promise.all([
    db('tasks?order=sort_order.asc,created_at.asc').catch(function(){return[];}),
    db('habits?order=sort_order.asc').catch(function(){return[];}),
    db('habit_logs').catch(function(){return[];}),
    db('bucket_list?order=sort_order.asc').catch(function(){return[];}),
    db('twelve_week_cycles?order=created_at.asc').catch(function(){return[];}),
    db('twelve_week_tasks?order=sort_order.asc').catch(function(){return[];}),
    db('grocery_lists?order=created_at.desc').catch(function(){return[];}),
    db('grocery_items?order=sort_order.asc').catch(function(){return[];}),
    db('fitness_meals?order=logged_date.desc').catch(function(){return[];}),
    db('fitness_weight_logs?order=logged_date.desc').catch(function(){return[];}),
    db('att_jobs?order=created_at.asc').catch(function(){return[];}),
    db('att_logs?order=log_date.desc').catch(function(){return[];}),
    db('fin_income?order=date.desc').catch(function(){return[];}),
    db('fin_expenses?order=date.desc').catch(function(){return[];}),
    db('fin_budgets').catch(function(){return[];}),
    db('fin_savings').catch(function(){return[];}),
    db('fin_bills').catch(function(){return[];}),
    db('fin_debts').catch(function(){return[];}),
    db('fin_networth').catch(function(){return[];}),
    db('fin_accounts').catch(function(){return[];})
  ]).then(function(r){
    tasks=r[0];habits=r[1];
    r[2].forEach(function(l){habitLogs[l.habit_id+'_'+l.logged_date]=l.completed;});
    blItems=r[3];
    cycles=r[4];cycles.forEach(function(c){if(typeof c.goals==='string'){try{c.goals=JSON.parse(c.goals);}catch(e){c.goals=[];}}});
    weekTasks=r[5];groceryLists=r[6];groceryItems=r[7];
    fitMeals=r[8];weightLogs=r[9];attJobs=r[10];attLogs=r[11];
    finIncome=r[12];finExpenses=r[13];finBudgets=r[14];finSavings=r[15];
    finBills=r[16];finDebts=r[17];finNW=r[18];finAccounts=r[19];
    cycIdx=cycles.length?cycles.length-1:0;
    renderAll();
  }).catch(function(){renderAll();});
}

function navigate(m){
  curMod=m;
  document.querySelectorAll('.ni').forEach(function(n){n.classList.toggle('active',n.dataset.m===m);});
  document.querySelectorAll('.mt').forEach(function(t){t.classList.toggle('active',t.dataset.m===m);});
  document.querySelectorAll('.mod').forEach(function(x){x.classList.toggle('active',x.id==='mod-'+m);});
  document.getElementById('ttitle').textContent=MOD_TITLES[m]||m;
  closeSB();
  renderMod(m);
}
function renderAll(){updateDT();renderMod('dashboard');}
function renderMod(m){
  if(m==='dashboard')renderDash();
  else if(m==='todo')renderTodo();
  else if(m==='calendar')renderCal();
  else if(m==='twelve')renderTwelve();
  else if(m==='fitness')renderFit();
  else if(m==='habits')renderHab();
  else if(m==='grocery')renderGroc();
  else if(m==='bucketlist')renderBL();
  else if(m==='finance')renderFin();
  else if(m==='attendance')renderAtt();
}
function updateDT(){
  var d=new Date(),h=d.getHours();
  var g=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  var ge=document.getElementById('dash-greeting');if(ge)ge.textContent=g+', Nikki \uD83D\uDC4B';
  var de=document.getElementById('tdate');if(de)de.textContent=MONTHS_S[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

// ── DASHBOARD ──
function renderDash(){
  updateDT();
  var todT=tasks.filter(function(t){return isToday(t)&&!t.done;});
  var odT=tasks.filter(function(t){return isOD(t);});
  var ms=finY+'-'+pad(finM+1);
  var inc=finIncome.filter(function(i){return i.date&&i.date.startsWith(ms);}).reduce(function(s,i){return s+(+i.amount||0);},0);
  var exp=finExpenses.filter(function(e){return e.date&&e.date.startsWith(ms);}).reduce(function(s,e){return s+(+e.amount||0);},0);
  var saved=finSavings.reduce(function(s,g){return s+(+g.current_amount||0);},0);
  var lw=weightLogs.length?weightLogs[0]:null;
  var aN=attLogs.filter(function(l){return l.log_date===todayStr();});
  var html='<div style="margin-bottom:20px"><h1 id="dash-greeting" style="font-size:24px;font-weight:800;color:var(--navy)">Good morning, Nikki</h1><p style="color:var(--text-muted);font-size:13px;margin-top:3px">'+DAYS[new Date().getDay()]+', '+MONTHS[new Date().getMonth()]+' '+new Date().getDate()+'</p></div>';
  html+='<div class="dg">';
  html+=dc('Today\'s Tasks',todT.length,'✅','due today',odT.length?odT.length+' overdue':'','todo');

function tSec(title,list,isOd){

function tCard(t){

function renderWeeklyTodo(filtered){
  var now=new Date();

  for(var i=0;i<7;i++){
    var d=new Date(now);d.setDate(now.getDate()-now.getDay()+i);
    var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    var isT=ds===todayStr();
    var dt=filtered.filter(function(t){return t.due_date===ds;});
    h+='<div style="background:var(--white);border-radius:10px;border:'+(isT?'2px solid var(--gold)':'1px solid var(--border)')+';overflow:hidden">';
    h+='<div style="padding:7px 9px;background:var(--offwhite);border-bottom:1px solid var(--border);text-align:center"><div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-muted)">'+DAYS[d.getDay()]+'</div><div style="font-size:17px;font-weight:800;color:'+(isT?'var(--gold)':'var(--navy)')+'">'+d.getDate()+'</div></div>';
    h+='<div style="padding:5px">';
    dt.forEach(function(t){var bg=t.done?'#f0f0f0':isOD(t)?'#fdeaea':t.group==='work'?'var(--gold-pale)':'#eef1fc';var col=t.done?'var(--text-muted)':isOD(t)?'var(--danger)':t.group==='work'?'#8a6820':'#4a6bc4';h+='<div style="font-size:10px;padding:3px 6px;border-radius:5px;margin-bottom:3px;cursor:pointer;background:'+bg+';color:'+col+'" data-edt="'+t.id+'">'+(t.done?'✓ ':'')+esc(t.name)+'</div>';});
    h+='<button style="width:100%;background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-muted);padding:4px;border-top:1px solid var(--border);margin-top:3px" data-add-date="'+ds+'">＋</button>';
    h+='</div></div>';

function togTask(id){var t=tasks.find(function(x){return x.id===id;});if(!t)return;t.done=!t.done;db('tasks?id=eq.'+id,{method:'PATCH',body:JSON.stringify({done:t.done})}).catch(function(){saveL();});renderTodo();renderDash();}
function delTask(id){if(!confirm('Delete?'))return;tasks=tasks.filter(function(t){return t.id!==id;});db('tasks?id=eq.'+id,{method:'DELETE'}).catch(function(){saveL();});renderTodo();renderDash();}

  h+='<div class="fi"><label>Recurring</label><select id="f-tr"><option value=""'+((!t||!t.recurring)?' selected':'')+'>None</option><option value="daily"'+(t&&t.recurring==='daily'?' selected':'')+'>Daily</option><option value="weekly"'+(t&&t.recurring==='weekly'?' selected':'')+'>Weekly</option><option value="monthly"'+(t&&t.recurring==='monthly'?' selected':'')+'>Monthly</option></select></div></div>';
  h+='<div class="ma"><button class="bc" id="tmo-cancel">Cancel</button><button class="bs" id="tmo-save">Save Task</button></div>';
  h+='</div></div>';

  document.getElementById('tmo-close').addEventListener('click',removeMo);
  document.getElementById('tmo-cancel').addEventListener('click',removeMo);
  document.getElementById('task-mo').addEventListener('click',function(e){if(e.target===this)removeMo();});
  document.getElementById('tmo-save').addEventListener('click',function(){
    var name=document.getElementById('f-tn').value.trim();if(!name)return;
    var data={name:name,due_date:document.getElementById('f-td').value||null,due_time:document.getElementById('f-tt').value||null,group:document.getElementById('f-tg').value,recurring:document.getElementById('f-tr').value||null,subtasks:[],done:false};
    if(editIds.task){var idx=tasks.findIndex(function(x){return x.id===editIds.task;});if(idx>=0)tasks[idx]=Object.assign(tasks[idx],data);db('tasks?id=eq.'+editIds.task,{method:'PATCH',body:JSON.stringify(data)}).catch(function(){saveL();});}
    else{var nt=Object.assign({id:uid(),sort_order:tasks.length,created_at:new Date().toISOString()},data);tasks.push(nt);db('tasks',{method:'POST',body:JSON.stringify(nt)}).catch(function(){saveL();});}

}

function renderCalPeriod(){
  var lbl='';
  if(calView==='monthly')lbl=MONTHS[calM]+' '+calY;
  else if(calView==='weekly'){var ws=calWS();var we=new Date(ws);we.setDate(ws.getDate()+6);lbl=MONTHS_S[ws.getMonth()]+' '+ws.getDate()+' – '+MONTHS_S[we.getMonth()]+' '+we.getDate();}
  else lbl=MONTHS[calM]+' '+calD+', '+calY;
  var el=document.getElementById('cal-plbl');if(el)el.textContent=lbl;
}
function calWS(){var d=new Date(calY,calM,calD);d.setDate(d.getDate()-d.getDay());return d;}
function navCal(dir){
  if(calView==='monthly'){calM+=dir;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}}
  else if(calView==='weekly'){calD+=dir*7;}
  else{calD+=dir;var dim=new Date(calY,calM+1,0).getDate();if(calD<1){calM--;if(calM<0){calM=11;calY--;}calD=new Date(calY,calM+1,0).getDate();}if(calD>dim){calD=1;calM++;if(calM>11){calM=0;calY++;}}}
  renderCalPeriod();renderCalMain();
}
function evOnDate(ds){return calEvents.filter(function(ev){return ev.start&&ev.start.date.toISOString().slice(0,10)===ds;});}
function renderCalMain(){
  var mc=document.getElementById('cal-main');if(!mc)return;
  if(!calCals.length||!calCals.some(function(c){return c.url;})){
    mc.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><div style="font-size:48px;margin-bottom:12px">📅</div><div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px">No calendars connected</div><button class="btn" id="cal-setup2">⚙️ Set up calendars</button></div>';
    var sb=document.getElementById('cal-setup2');if(sb)sb.addEventListener('click',openCalSetup);
    return;
  }
  if(calView==='monthly')calMont(mc);
  else if(calView==='weekly')calWeek(mc);
  else calDay(mc);
}
function calMont(mc){
  var y=calY,m=calM;
  var fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  var h='<div style="padding:0 14px 14px"><div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px">';
  DAYS.forEach(function(d){h+='<div style="text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-muted);padding:8px 0">'+d+'</div>';});
  h+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">';
  var cells=[];
  for(var i=0;i<fd;i++)cells.push({d:prev-fd+1+i,cur:false});
  for(var dd=1;dd<=dim;dd++)cells.push({d:dd,cur:true});
  while(cells.length%7!==0)cells.push({d:cells.length-fd-dim+1,cur:false});
  cells.forEach(function(cell){
    var cd=cell.cur?new Date(y,m,cell.d):null;
    var ds=cd?cd.toISOString().slice(0,10):'';
    var isT=ds===todayStr();
    var evs=ds?evOnDate(ds):[];
    h+='<div style="background:'+(isT?'var(--gold-pale)':cell.cur?'var(--white)':'var(--offwhite)')+';min-height:80px;padding:5px;cursor:pointer"'+(ds?' data-cd="'+ds+'"':'')+'>'+
      '<div style="font-size:11px;font-weight:700;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px;background:'+(isT?'var(--gold)':'none')+';color:'+(isT?'#fff':cell.cur?'var(--text)':'var(--border)')+'">'+cell.d+'</div>';
    evs.slice(0,3).forEach(function(ev){h+='<div style="font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500;background:'+hexA(ev.calColor||'#4285f4',.15)+';color:'+(ev.calColor||'#4285f4')+'" data-evid="'+calEvents.indexOf(ev)+'">'+esc(ev.title||'')+'</div>';});
    if(evs.length>3)h+='<div style="font-size:9px;color:var(--text-muted);padding:1px 3px">+'+(evs.length-3)+' more</div>';
    h+='</div>';
  });
  h+='</div></div>';
  mc.innerHTML=h;
  mc.querySelectorAll('[data-cd]').forEach(function(el){el.addEventListener('click',function(){var p=el.dataset.cd.split('-');calY=+p[0];calM=+p[1]-1;calD=+p[2];calView='daily';renderCalMain();renderCalPeriod();});});
  mc.querySelectorAll('[data-evid]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();showEv(+el.dataset.evid);});});
}
function calWeek(mc){

function parseICS(text,cal){
  var events=[],ev=null;
  text.replace(/\r\n[ \t]/g,'').replace(/\r/g,'').split('\n').forEach(function(line){
    line=line.trim();
    if(line==='BEGIN:VEVENT'){ev={calId:cal.id,calColor:cal.color,calName:cal.name};return;}
    if(line==='END:VEVENT'){if(ev&&ev.start)events.push(ev);ev=null;return;}
    if(!ev)return;
    var ci=line.indexOf(':');if(ci<0)return;
    var key=line.substring(0,ci).split(';')[0].toUpperCase(),val=line.substring(ci+1);
    if(key==='SUMMARY')ev.title=val.replace(/\\,/g,',').replace(/\\n/g,' ');
    if(key==='DTSTART')ev.start=piDate(val);
    if(key==='DTEND')ev.end=piDate(val);
    if(key==='DESCRIPTION')ev.desc=val.replace(/\\n/g,'\n').replace(/\\,/g,',');
    if(key==='LOCATION')ev.location=val.replace(/\\,/g,',');
  });
  return events;
}
function piDate(val){
  val=val.trim();var aD=val.indexOf('T')<0;
  if(aD&&val.length>=8)return{date:new Date(+val.substr(0,4),+val.substr(4,2)-1,+val.substr(6,2)),allDay:true};
  if(val.length>=15){var y=+val.substr(0,4),mo=+val.substr(4,2)-1,d=+val.substr(6,2),h=+val.substr(9,2),m=+val.substr(11,2),s=+val.substr(13,2);var dt=val.charAt(15)==='Z'?new Date(Date.UTC(y,mo,d,h,m,s)):new Date(y,mo,d,h,m,s);return{date:dt,allDay:false};}
  return null;
}

}

// -- FITNESS --
var useMetric=true;
var editMealId=null,editWeightId=null;

function kgToLbs(kg){return kg?Math.round((+kg)*2.20462*10)/10:0;}
function lbsToKg(lbs){return lbs?+(+lbs/2.20462).toFixed(2):0;}
function toDisplayW2(kg){return useMetric?+(+kg).toFixed(1):kgToLbs(+kg);}
function toDisplayH2(cm){return useMetric?+(+cm).toFixed(0):+(+cm/2.54).toFixed(1);}
function toDisplayL(cm){return useMetric?+(+cm).toFixed(1):+(+cm/2.54).toFixed(1);}
function weightUnit2(){return useMetric?'kg':'lbs';}
function lenUnit2(){return useMetric?'cm':'in';}

function renderFit(){
  try{useMetric=localStorage.getItem('nmb_fit_unit')!=='lbs';}catch(e){}
  var c=document.getElementById('fit-inner');
  var tabs=['goals','meals'];
  var tlbls=['Goals & Weight','Meals & Calories'];
  var html='<div style="background:var(--white);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10">';
  html+='<h2 style="font-size:15px;font-weight:800;color:var(--navy)">&#x1F4AA; Fitness</h2>';
  html+='<div style="display:flex;background:var(--offwhite);border:1px solid var(--border);border-radius:8px;overflow:hidden">';
  html+='<button style="padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:'+(useMetric?'var(--navy)':'none')+';color:'+(useMetric?'var(--gold)':'var(--text-muted)')+'" id="fit-unit-kg">kg/cm</button>';
  html+='<button style="padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:'+(!useMetric?'var(--navy)':'none')+';color:'+(!useMetric?'var(--gold)':'var(--text-muted)')+'" id="fit-unit-lbs">lbs/in</button>';
  html+='</div>';
  html+='<div style="display:flex;background:var(--offwhite);border:1px solid var(--border);border-radius:8px;overflow:hidden">';
  tabs.forEach(function(t,i){html+='<button style="padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:'+(fitTab===t?'var(--navy)':'none')+';color:'+(fitTab===t?'var(--gold)':'var(--text-muted)')+'" data-fittab="'+t+'">'+tlbls[i]+'</button>';});
  html+='</div>';
  html+='<div style="flex:1"></div>';
  if(fitTab==='meals')html+='<button class="btn" id="fit-add-btn">&#65291; Log Meal</button>';
  html+='</div>';
  html+='<div style="padding:18px 22px" id="fit-body">';
  if(fitTab==='goals')html+=renderFitGoals2();
  else html+=renderFitMeals2();
  html+='</div>';
  c.innerHTML=html;
  c.querySelectorAll('[data-fittab]').forEach(function(b){b.addEventListener('click',function(){fitTab=b.dataset.fittab;renderFit();});});
  var fab=c.querySelector('#fit-add-btn');
  if(fab)fab.addEventListener('click',function(){openFitMealModal(null);});
  var ukg=c.querySelector('#fit-unit-kg');if(ukg)ukg.addEventListener('click',function(){useMetric=true;try{localStorage.setItem('nmb_fit_unit','kg');}catch(e){}renderFit();});
  var ulbs=c.querySelector('#fit-unit-lbs');if(ulbs)ulbs.addEventListener('click',function(){useMetric=false;try{localStorage.setItem('nmb_fit_unit','lbs');}catch(e){}renderFit();});
  var ogsb=c.querySelector('#btn-fit-goals-settings');if(ogsb)ogsb.addEventListener('click',openFitGoalsModal);
  var blwq=c.querySelector('#btn-log-weight');if(blwq)blwq.addEventListener('click',function(){openFitWeightModal(null);});
  var mp=c.querySelector('#fit-meal-prev');if(mp)mp.addEventListener('click',function(){var d=new Date(fitMealDate+'T00:00');d.setDate(d.getDate()-1);fitMealDate=d.toISOString().slice(0,10);renderFit();});
  var mn=c.querySelector('#fit-meal-next');if(mn)mn.addEventListener('click',function(){var d=new Date(fitMealDate+'T00:00');d.setDate(d.getDate()+1);fitMealDate=d.toISOString().slice(0,10);renderFit();});
  var mt=c.querySelector('#fit-meal-today');if(mt)mt.addEventListener('click',function(){fitMealDate=todayStr();renderFit();});
  c.querySelectorAll('[data-edit-meal]').forEach(function(b){b.addEventListener('click',function(){openFitMealModal(b.dataset.editMeal);});});
  c.querySelectorAll('[data-del-meal]').forEach(function(b){b.addEventListener('click',function(){if(!confirm('Delete this meal?'))return;fitMeals=fitMeals.filter(function(m){return m.id!==b.dataset.delMeal;});db('fitness_meals?id=eq.'+b.dataset.delMeal,{method:'DELETE'}).catch(function(){saveL();});renderFit();});});
  c.querySelectorAll('[data-edit-we]').forEach(function(b){b.addEventListener('click',function(){openFitWeightModal(b.dataset.editWe);});});
  c.querySelectorAll('[data-del-we]').forEach(function(b){b.addEventListener('click',function(){if(!confirm('Delete?'))return;weightLogs=weightLogs.filter(function(l){return l.id!==b.dataset.delWe;});db('fitness_weight_logs?id=eq.'+b.dataset.delWe,{method:'DELETE'}).catch(function(){saveL();});renderFit();});});
}

function renderFitGoals2(){
  var g=fitnessGoals;
  var lw=weightLogs.length?weightLogs[0]:null;
  var wDisp=lw&&lw.weight?toDisplayW2(lw.weight).toFixed(1):null;
  var gwDisp=g.weight_goal?toDisplayW2(g.weight_goal).toFixed(1):null;
  var bmi='--',bmiCat='',bmiColor='var(--text-muted)';
  if(lw&&lw.weight&&g.height_cm){var b=(lw.weight/Math.pow(g.height_cm/100,2)).toFixed(1);bmi=b;if(b<18.5){bmiCat='Underweight';bmiColor='#4a6bc4';}else if(b<25){bmiCat='Normal ✅';bmiColor='var(--success)';}else if(b<30){bmiCat='Overweight';bmiColor='var(--warn)';}else{bmiCat='Obese';bmiColor='var(--danger)';}}
  var sevenAgo=new Date();sevenAgo.setDate(sevenAgo.getDate()-6);var sas=sevenAgo.toISOString().slice(0,10);
  var rMeals=fitMeals.filter(function(m){return m.logged_date>=sas;});

  var wPct=0;if(g.weight_start&&g.weight_goal&&lw&&lw.weight&&g.weight_start!==g.weight_goal){wPct=Math.min(100,Math.max(0,Math.round((g.weight_start-lw.weight)/(g.weight_start-g.weight_goal)*100)));}
  var bfLw=weightLogs.find(function(l){return l.body_fat;});
  var bfPct=0;if(g.bf_start&&g.bf_goal&&bfLw){bfPct=Math.min(100,Math.max(0,Math.round((g.bf_start-bfLw.body_fat)/(g.bf_start-g.bf_goal)*100)));}

  h+='<div><span style="font-size:26px;font-weight:900;color:var(--navy)">'+(wDisp||'--')+'</span><span style="font-size:13px;color:var(--text-muted);margin-left:3px">'+weightUnit2()+'</span></div>';
  if(g.weight_goal&&lw&&lw.weight){var diff=lw.weight-g.weight_goal;h+='<div style="font-size:12px;color:var(--text-muted);margin-top:4px">'+(diff>0?toDisplayW2(diff).toFixed(1)+' '+weightUnit2()+' to goal':'&#x1F389; Goal reached!')+'</div>';}
  else h+='<div style="font-size:12px;color:var(--text-muted);margin-top:4px">No goal set</div>';
  if(wPct>0){h+='<div class="pb" style="margin-top:8px"><div class="pf" style="width:'+wPct+'%;background:var(--gold)"></div></div><div style="font-size:11px;color:var(--text-muted);margin-top:3px">'+wPct+'% to goal · '+( gwDisp||'--')+' '+weightUnit2()+'</div>';}
  h+='</div>';

  // BMI card
  h+='<div class="card" style="padding:16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px">&#x1F4CA; BMI</div>';
  h+='<div><span style="font-size:26px;font-weight:900;color:var(--navy)">'+bmi+'</span></div>';
  h+='<div style="font-size:12px;font-weight:700;color:'+bmiColor+';margin-top:4px">'+bmiCat+'</div>';
  if(g.height_cm)h+='<div style="font-size:11px;color:var(--text-muted);margin-top:3px">Height: '+toDisplayH2(g.height_cm)+' '+lenUnit2()+'</div>';
  h+='</div>';

  // Body fat card
  h+='<div class="card" style="padding:16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px">&#x1F525; Body Fat</div>';
  h+='<div><span style="font-size:26px;font-weight:900;color:var(--navy)">'+(bfLw&&bfLw.body_fat?bfLw.body_fat:'--')+'</span><span style="font-size:13px;color:var(--text-muted);margin-left:3px">%</span></div>';
  if(g.bf_goal)h+='<div style="font-size:12px;color:var(--text-muted);margin-top:4px">Goal: '+g.bf_goal+'%</div>';
  else h+='<div style="font-size:12px;color:var(--text-muted);margin-top:4px">No goal set</div>';
  if(bfPct>0){h+='<div class="pb" style="margin-top:8px"><div class="pf" style="width:'+bfPct+'%;background:#7c9de8"></div></div><div style="font-size:11px;color:var(--text-muted);margin-top:3px">'+bfPct+'% progress</div>';}
  h+='</div>';

  // Calories card
  h+='<div class="card" style="padding:16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px">&#x1F37D;&#xFE0F; Calories</div>';
  h+='<div style="display:flex;gap:10px;margin-top:4px">';
  h+='<div style="flex:1;background:var(--offwhite);border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:var(--navy)">'+(g.cal_ideal||'--')+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">Ideal/day</div></div>';

  h+='</div>';
  if(g.cal_ideal&&avgCal){var def2=g.cal_ideal-avgCal;h+='<div style="text-align:center;margin-top:8px;font-size:11px;font-weight:700;padding:4px 8px;border-radius:10px;background:'+(def2>0?'#e8f5ee':'#fdeaea')+';color:'+(def2>0?'var(--success)':'var(--danger)')+'">'+( def2>0?'Avg deficit: '+def2+' kcal':'Avg surplus: '+Math.abs(def2)+' kcal')+'</div>';}
  h+='</div>';

  h+='</div>';

  // Action buttons
  h+='<div style="display:flex;gap:10px;margin-bottom:20px">';

  h+='<button class="btn-g" id="btn-fit-goals-settings">&#x2699;&#xFE0F; Edit Goals</button>';

  h+='<div class="card"><table class="tbl"><thead><tr>';

    weightLogs.forEach(function(l,i){
      var prev=weightLogs[i+1];

      h+='<tr>';
      h+='<td>'+fmtDate(l.logged_date)+'</td>';
      h+='<td style="font-weight:700">'+(l.weight?toDisplayW2(l.weight).toFixed(1):'--')+'</td>';
      h+='<td>'+(l.body_fat?l.body_fat+'%':'--')+'</td>';
      h+='<td>'+(delta!==null?'<span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px;background:'+(+delta<0?'#e8f5ee':'#fdeaea')+';color:'+(+delta<0?'var(--success)':'var(--danger)')+'">'+( +delta<0?delta:'+'+delta)+' '+weightUnit2()+'</span>':'--')+'</td>';
      h+='<td>'+(l.waist?toDisplayL(l.waist).toFixed(1):'--')+'</td>';
      h+='<td>'+(l.hip?toDisplayL(l.hip).toFixed(1):'--')+'</td>';
      h+='<td style="font-size:12px;color:var(--text-muted)">'+esc(l.notes||'')+'</td>';
      h+='<td style="white-space:nowrap"><button class="ab" data-edit-we="'+l.id+'">&#9999;&#xFE0F;</button><button class="ab" style="color:var(--danger)" data-del-we="'+l.id+'">&times;</button></td>';
      h+='</tr>';
    });
  }
  h+='</tbody></table></div>';
  return h;
}

  h+='<div style="background:var(--white);border-radius:10px;padding:13px 15px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:800;color:var(--navy)">'+(ideal||'--')+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.6px">Ideal</div></div>';
  h+='<div style="background:var(--white);border-radius:10px;padding:13px 15px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:800;color:'+(def===null?'var(--navy)':def>0?'var(--success)':'var(--danger)')+'">'+( def===null?'--':Math.abs(def))+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.6px">'+(def===null?'Deficit':def>0?'Deficit ✅':'Surplus ⚠️')+'</div></div>';

  h+='</div>';

function estGrocP(name,qty){if(!name)return 0;var n=name.toLowerCase();var keys=Object.keys(PH_PRICES).sort(function(a,b){return b.length-a.length;});for(var i=0;i<keys.length;i++){if(n.indexOf(keys[i])>=0)return Math.round((+qty||1)*PH_PRICES[keys[i]].price);}return 0;}

  h+='<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--navy)">'+items.length+'</div><div style="font-size:10px;color:var(--text-muted)">Items</div></div>';
  h+='<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--success)">'+items.filter(function(i){return i.checked;}).length+'</div><div style="font-size:10px;color:var(--text-muted)">Checked</div></div>';

  else{items.forEach(function(item){var ep=estGrocP(item.name,item.qty);h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px"><div style="width:16px;height:16px;border-radius:3px;border:2px solid '+(item.checked?'var(--success)':'var(--border)')+';cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;background:'+(item.checked?'var(--success)':'none')+';color:#fff" data-gchk="'+item.id+'">'+(item.checked?'✓':'')+'</div><div style="flex:1;font-weight:500'+(item.checked?';text-decoration:line-through;color:var(--text-muted)':'')+'">'+esc(item.name)+'</div><div style="font-size:11px;color:var(--text-muted)">'+esc(String(item.qty||1))+' '+esc(item.unit||'pc')+'</div>'+(ep?'<span style="font-size:11px;font-weight:700;color:var(--navy);background:var(--gold-pale);padding:1px 6px;border-radius:8px">\u20B1'+Math.round(ep).toLocaleString()+'</span>':'')+'<button class="ab" data-dgi="'+item.id+'">🗑️</button></div>';}); }
  return h+'</div></div>';
}

function showFinP(type){
  var prompts={income:'Source, Amount, Date (YYYY-MM-DD), Category (salary/freelance/business/bonus/other)',expense:'Description, Amount, Date (YYYY-MM-DD), Category (food/transport/utilities/rent/health/shopping/entertainment/other)',budget:'Category (food/transport/utilities/rent/health/shopping/entertainment/other), Monthly Amount',savings:'Goal Name, Target Amount, Current Saved, Target Date (YYYY-MM-DD)',bill:'Name, Amount, Due Day (1-31), Status (due/paid/overdue)',debt:'Name, Total Amount, Remaining Balance, Monthly Payment',nwitem:'Name, Type (asset/liability), Value, Category (cash/investment/property/vehicle/loan/credit)',account:'Name, Type (bank/ewallet/cash/credit/investment), Balance'};
  var v=prompt('Fill in (comma-separated):\n'+(prompts[type]||''));if(!v)return;
  var p=v.split(',').map(function(s){return s.trim();});
  var item={id:uid(),created_at:new Date().toISOString()};
  if(type==='income'){item.source=p[0];item.amount=+p[1]||0;item.date=p[2]||todayStr();item.category=p[3]||'other';finIncome.unshift(item);db('fin_income',{method:'POST',body:JSON.stringify(item)}).catch(function(){});}
  else if(type==='expense'){item.description=p[0];item.amount=+p[1]||0;item.date=p[2]||todayStr();item.category=p[3]||'other';finExpenses.unshift(item);db('fin_expenses',{method:'POST',body:JSON.stringify(item)}).catch(function(){});}
  else if(type==='budget'){item.category=p[0];item.amount=+p[1]||0;finBudgets.push(item);db('fin_budgets',{method:'POST',body:JSON.stringify(item)}).catch(function(){});}
  else if(type==='savings'){item.name=p[0];item.target_amount=+p[1]||0;item.current_amount=+p[2]||0;item.target_date=p[3]||null;item.icon='⭐';finSavings.push(item);db('fin_savings',{method:'POST',body:JSON.stringify(item)}).catch(function(){});}
  else if(type==='bill'){item.name=p[0];item.amount=+p[1]||0;item.due_day=+p[2]||null;item.status=p[3]||'due';finBills.push(item);db('fin_bills',{method:'POST',body:JSON.stringify(item)}).catch(function(){});}
  else if(type==='debt'){item.name=p[0];item.total_amount=+p[1]||0;item.remaining_balance=+p[2]||0;item.monthly_payment=+p[3]||0;finDebts.push(item);db('fin_debts',{method:'POST',body:JSON.stringify(item)}).catch(function(){});}
  else if(type==='nwitem'){item.name=p[0];item.type=p[1]||'asset';item.value=+p[2]||0;item.category=p[3]||'other';finNW.push(item);db('fin_networth',{method:'POST',body:JSON.stringify(item)}).catch(function(){});}
  else if(type==='account'){item.name=p[0];item.type=p[1]||'bank';item.balance=+p[2]||0;finAccounts.push(item);db('fin_accounts',{method:'POST',body:JSON.stringify(item)}).catch(function(){});}
  renderFin();renderDash();
}

function attDR(j){if(+j.daily_rate)return +j.daily_rate;var s=+j.basic_salary||0;if(j.salary_type==='monthly')return s/22;if(j.salary_type==='semi-monthly')return(s*2)/22;if(j.salary_type==='daily')return s;if(j.salary_type==='hourly')return s*8;return s/22;}
function compPay(j,jL){
  var dr=attDR(j),otr=dr/8*1.25;
  var pres=jL.filter(function(l){return l.status==='present'||l.status==='wfh';}).length;
  var half=jL.filter(function(l){return l.status==='halfday';}).length;
  var ot=jL.reduce(function(s,l){return s+(+l.ot_hours||0);},0);
  var late=jL.reduce(function(s,l){return s+(+l.late_minutes||0);},0);
  var gross=(pres*dr)+(half*dr*.5)+(ot*otr);var ld=(late/60)*dr;
  var sal=+j.basic_salary||0;if(j.salary_type==='semi-monthly')sal*=2;else if(j.salary_type==='daily')sal=dr*22;
  var sss=Math.min(sal*.045,900),ph=Math.min(sal*.025,500),pib=100;
  return{gross:gross,late:ld,sss:sss,ph:ph,pib:pib,net:gross-ld-sss-ph-pib,pres:pres,half:half,abs:jL.filter(function(l){return l.status==='absent';}).length,ot:ot,dr:dr};
}
function renderAtt(){
  var ms=attY+'-'+pad(attM+1);
  var c=document.getElementById('att-inner');

  var ATT_LABELS=['Overview','My Jobs','Log','Payroll'];

  html+='<div style="font-size:14px;font-weight:800;color:var(--gold);padding:14px 16px 14px 0;border-right:1px solid rgba(255,255,255,.1);margin-right:4px;white-space:nowrap;flex-shrink:0">🕐 Attendance</div>';
  html+='<div style="display:flex">';
  ATT_TABS.forEach(function(t,i){html+='<button style="padding:14px 14px;font-size:12px;font-weight:600;cursor:pointer;color:'+(attTab===t?'var(--gold)':'rgba(255,255,255,.55)')+';border-bottom:2px solid '+(attTab===t?'var(--gold)':'transparent')+';white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none" data-at2="'+t+'">'+ATT_LABELS[i]+'</button>';});
  html+='</div>';
  html+='<div style="margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:12px;flex-shrink:0">';
  html+='<button style="background:none;border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:6px 11px;font-size:11px;cursor:pointer;color:rgba(255,255,255,.7)" id="att-add-job">⚙️ Add Job</button>';
  html+='<button style="background:var(--gold);color:var(--navy);border:none;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:800;cursor:pointer" id="att-log-btn">＋ Log</button>';
  html+='</div></div>';
  html+='<div style="overflow-y:auto;padding:18px 22px" id="att-body">';
  html+=renderAttTab(ms);
  html+='</div>';
  c.innerHTML=html;
  c.querySelectorAll('[data-at2]').forEach(function(b){b.addEventListener('click',function(){attTab=b.dataset.at2;renderAtt();});});
  c.querySelector('#att-add-job').addEventListener('click',function(){addAttJob();});
  c.querySelector('#att-log-btn').addEventListener('click',function(){addAttLog(null);});
  c.querySelectorAll('[data-daj]').forEach(function(b){b.addEventListener('click',function(){if(!confirm('Delete job and logs?'))return;attJobs=attJobs.filter(function(j){return j.id!==b.dataset.daj;});attLogs=attLogs.filter(function(l){return l.job_id!==b.dataset.daj;});db('att_jobs?id=eq.'+b.dataset.daj,{method:'DELETE'}).catch(function(){});saveL();renderAtt();});});
  c.querySelectorAll('[data-dal]').forEach(function(b){b.addEventListener('click',function(){if(!confirm('Delete?'))return;attLogs=attLogs.filter(function(l){return l.id!==b.dataset.dal;});db('att_logs?id=eq.'+b.dataset.dal,{method:'DELETE'}).catch(function(){saveL();});renderAtt();});});
  c.querySelectorAll('[data-lj]').forEach(function(b){b.addEventListener('click',function(){addAttLog(b.dataset.lj);});});
  var apb=c.querySelector('#att-prev');if(apb)apb.addEventListener('click',function(){attM--;if(attM<0){attM=11;attY--;}renderAtt();});
  var anb=c.querySelector('#att-next');if(anb)anb.addEventListener('click',function(){attM++;if(attM>11){attM=0;attY++;}renderAtt();});
  var ajf=c.querySelector('#att-jf');if(ajf)ajf.addEventListener('change',function(){attFJ=this.value;renderAtt();});
}
function renderAttTab(ms){
  var mL=attLogs.filter(function(l){return l.log_date&&l.log_date.startsWith(ms);});
  var gN=0;attJobs.forEach(function(j){gN+=compPay(j,mL.filter(function(l){return l.job_id===j.id;})).net;});
  if(attTab==='overview'){
    var h='<div class="sg">'+fsc2('Jobs',String(attJobs.length),'s','')+fsc2('Days Present',String(mL.filter(function(l){return l.status==='present'||l.status==='wfh';}).length),'','This month')+fsc2('OT Hours',mL.reduce(function(s,l){return s+(+l.ot_hours||0);},0).toFixed(1)+'h','','This month')+fsc2('Est. Net Pay',peso(gN),'i','All jobs')+'</div>';
    if(!attJobs.length){return h+'<div class="card"><div style="text-align:center;padding:48px;color:var(--text-muted)"><div style="font-size:48px;margin-bottom:12px">🕐</div><div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px">No jobs yet</div></div></div>';}
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:16px">';
    attJobs.forEach(function(j){var jl=mL.filter(function(l){return l.job_id===j.id;});var p=compPay(j,jl);h+='<div class="card"><div style="height:4px;background:'+esc(j.color||'#c9a84c')+'"></div><div style="padding:16px"><div style="font-size:16px;font-weight:800;color:var(--navy)">'+esc(j.name||'')+'</div><div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">'+esc(j.role||'')+'</div><div style="display:flex;gap:14px;flex-wrap:wrap"><div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--navy)">'+p.pres+'</div><div style="font-size:9px;color:var(--text-muted)">PRESENT</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--navy)">'+p.abs+'</div><div style="font-size:9px;color:var(--text-muted)">ABSENT</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--navy)">'+p.ot.toFixed(1)+'h</div><div style="font-size:9px;color:var(--text-muted)">OT</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--success)">'+peso(p.net)+'</div><div style="font-size:9px;color:var(--text-muted)">EST. NET</div></div></div></div></div>';});
    h+='</div><div style="display:flex;gap:8px;align-items:center"><button class="btn-g" id="att-prev" style="font-size:12px;padding:5px 10px">‹ Prev</button><span style="font-size:13px;font-weight:700;color:var(--text-muted)">'+MONTHS_S[attM]+' '+attY+'</span><button class="btn-g" id="att-next" style="font-size:12px;padding:5px 10px">Next ›</button></div>';
    return h;
  }
  if(attTab==='jobs'){
    if(!attJobs.length)return'<div class="card"><div style="text-align:center;padding:40px;color:var(--text-muted)">No jobs yet.</div></div>';
    var h2='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">';
    attJobs.forEach(function(j){h2+='<div class="card"><div style="height:4px;background:'+esc(j.color||'#c9a84c')+'"></div><div style="padding:16px"><div style="font-size:16px;font-weight:800;color:var(--navy)">'+esc(j.name||'')+'</div><div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">'+esc(j.role||'')+(j.employment_type?' · '+esc(j.employment_type):'')+'</div><div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">'+peso(attDR(j))+'/day</div>'+(j.cutoff_day1||j.cutoff_day2?'<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Cutoff: Day '+(j.cutoff_day1||'—')+' & '+(j.cutoff_day2||'—')+'</div>':'')+
      '<div style="display:flex;gap:7px;margin-top:10px"><button class="btn-g" style="flex:1;font-size:11px" data-lj="'+j.id+'">＋ Log</button><button class="btn-g" style="font-size:11px;color:var(--danger);border-color:var(--danger)" data-daj="'+j.id+'">🗑️</button></div></div></div>';});
    return h2+'</div>';
  }
  if(attTab==='logs'){
    var fl=attLogs.filter(function(l){return l.log_date&&l.log_date.startsWith(ms)&&(attFJ==='all'||l.job_id===attFJ);});
    var h3='<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">';
    h3+='<select id="att-jf" style="padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit"><option value="all">All Jobs</option>';
    attJobs.forEach(function(j){h3+='<option value="'+j.id+'"'+(attFJ===j.id?' selected':'')+'>'+esc(j.name)+'</option>';});
    h3+='</select><button class="btn-g" id="att-prev" style="font-size:12px;padding:5px 8px">‹</button><span style="font-size:13px;font-weight:700;color:var(--navy)">'+MONTHS_S[attM]+' '+attY+'</span><button class="btn-g" id="att-next" style="font-size:12px;padding:5px 8px">›</button></div>';
    h3+='<div class="card"><table class="tbl"><thead><tr><th>Date</th><th>Job</th><th>Status</th><th>Time In</th><th>Time Out</th><th>OT</th><th>Late</th><th></th></tr></thead><tbody>';
    if(!fl.length)h3+='<tr class="er"><td colspan="8">No logs this period.</td></tr>';
    fl.forEach(function(l){var j=attJobs.find(function(x){return x.id===l.job_id;})||{};var sc={present:'background:#e8f5ee;color:var(--success)',absent:'background:#fdeaea;color:var(--danger)',halfday:'background:var(--gold-pale);color:var(--gold)',leave:'background:#eef1fc;color:#4a6bc4',holiday:'background:#f3e8ff;color:#9c27b0',wfh:'background:#e8f5ee;color:var(--success)'}[l.status]||'';h3+='<tr><td>'+fmtDate(l.log_date)+'</td><td><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:'+esc(j.color||'#ccc')+'"></span>'+esc(j.name||'—')+'</span></td><td><span class="bdg" style="'+sc+'">'+esc(l.status||'')+'</span></td><td>'+esc(l.time_in||'—')+'</td><td>'+esc(l.time_out||'—')+'</td><td>'+(+l.ot_hours||0)+'h</td><td>'+(+l.late_minutes||0)+'m</td><td><button class="ab" data-dal="'+l.id+'">🗑️</button></td></tr>';});
    return h3+'</tbody></table></div>';
  }
  if(attTab==='payroll'){
    var gNet=0;
    var h4='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px"><h2 style="font-size:15px;font-weight:800;color:var(--navy)">Payroll — '+MONTHS[attM]+' '+attY+'</h2><div style="display:flex;gap:7px"><button class="btn-g" id="att-prev" style="font-size:12px;padding:5px 10px">‹</button><button class="btn-g" id="att-next" style="font-size:12px;padding:5px 10px">›</button></div></div>';
    h4+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">';
    attJobs.forEach(function(j){var jl=mL.filter(function(l){return l.job_id===j.id;});var p=compPay(j,jl);gNet+=p.net;
      h4+='<div class="card"><div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:'+esc(j.color||'var(--navy)')+'"><span style="font-size:13px;font-weight:800;color:#fff">'+esc(j.name||'')+'</span><span style="font-size:10px;color:rgba(255,255,255,.7)">'+esc(j.salary_type||'')+'</span></div>';
      function pl(l,v,d){return '<div style="display:flex;justify-content:space-between;padding:6px 16px;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text-muted)">'+l+'</span><span style="font-weight:600;color:'+(d?'var(--danger)':'var(--navy)')+'">'+v+'</span></div>';}
      h4+=pl('Daily Rate',peso(p.dr),false)+pl('Days Present',p.pres+' days',false)+pl('Half Days',p.half+' days',false)+pl('OT Hours',p.ot.toFixed(1)+'h',false);
      h4+='<div style="display:flex;justify-content:space-between;padding:6px 16px;border-bottom:1px solid var(--border);font-size:12px;background:var(--offwhite)"><span style="color:var(--text-muted)">Gross Pay</span><span style="font-weight:800;color:var(--navy)">'+peso(p.gross)+'</span></div>';
      h4+=pl('Late Deduction','− '+peso(p.late),true)+pl('SSS 4.5%','− '+peso(p.sss),true)+pl('PhilHealth 2.5%','− '+peso(p.ph),true)+pl('Pag-IBIG','− '+peso(p.pib),true);
      h4+='<div style="padding:12px 16px;background:var(--navy);display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--gold-pale);font-weight:600">🏦 Net Pay</span><span style="font-size:20px;font-weight:900;color:var(--gold)">'+peso(p.net)+'</span></div></div>';
    });
    h4+='</div>';
    if(attJobs.length)h4+='<div style="background:var(--navy);border-radius:var(--radius);padding:18px 22px;margin-top:14px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;font-weight:700;color:var(--gold-pale)">💰 Total Estimated Net</div><div style="font-size:26px;font-weight:900;color:var(--gold)">'+peso(gNet)+'</div></div>';
    h4+='<div style="margin-top:12px;font-size:11px;color:var(--text-muted);line-height:1.6">⚠️ Estimates: SSS 4.5% max ₱900, PhilHealth 2.5% max ₱500, Pag-IBIG ₱100. OT at 125%. Verify with payslip.</div>';
    return h4;
  }
  return '';
}
function addAttJob(){
  var name=prompt('Company / Job Name:');if(!name)return;
  var role=prompt('Role / Position:','');
  var st=prompt('Salary Type (monthly/semi-monthly/daily/hourly):','semi-monthly');
  var sal=prompt('Basic Salary / Rate (₱):','0');
  var daily=prompt('Daily Rate (₱) — leave blank to auto-compute:','');
  var c1=prompt('Cutoff Day 1 (e.g. 15):','15');
  var c2=prompt('Cutoff Day 2 (e.g. 30):','30');
  var color=prompt('Color (hex):','#c9a84c');
  var j={id:uid(),name:name.trim(),role:role||'',employment_type:'onsite',salary_type:st||'semi-monthly',basic_salary:+sal||0,daily_rate:+daily||0,cutoff_day1:+c1||null,cutoff_day2:+c2||null,color:color||'#c9a84c',created_at:new Date().toISOString()};
  attJobs.push(j);db('att_jobs',{method:'POST',body:JSON.stringify(j)}).catch(function(){saveL();});renderAtt();
}
function addAttLog(preJobId){
  if(!attJobs.length){alert('Add a job first.');return;}
  var names=attJobs.map(function(j,i){return (i+1)+': '+j.name;}).join('\n');
  var idx=prompt('Select job:\n'+names,'1');if(!idx)return;
  var job=attJobs[+idx-1]||attJobs[0];
  var date=prompt('Date (YYYY-MM-DD):',todayStr());if(!date)return;
  var status=prompt('Status (present/absent/halfday/leave/holiday/wfh):','present');
  var tin=prompt('Time In (HH:MM):','08:00');
  var tout=prompt('Time Out (HH:MM):','17:00');
  var ot=prompt('OT Hours:','0');
  var late=prompt('Late (minutes):','0');
  var l={id:uid(),job_id:job.id,log_date:date,status:status||'present',time_in:tin||null,time_out:tout||null,ot_hours:+ot||0,late_minutes:+late||0,notes:'',created_at:new Date().toISOString()};
  attLogs.unshift(l);db('att_logs',{method:'POST',body:JSON.stringify(l)}).catch(function(){saveL();});renderAtt();renderDash();
}

  var mos=['task-mo','cyc-mo','t12-mo','hab-mo','bl-mo','cal-mo'];
  mos.forEach(function(id){var el=document.getElementById(id);if(el)el.remove();});
}
