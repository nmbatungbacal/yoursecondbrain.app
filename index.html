<style>
:root{--navy:#0f1b2d;--navy-light:#1e3150;--gold:#c9a84c;--gold-pale:#f5e9c8;--white:#fff;--offwhite:#f8f6f1;--text:#1a1a2e;--text-muted:#7a8399;--border:#e2ddd4;--success:#4caf7d;--danger:#e05c5c;--warn:#f59e0b;--radius:12px;--shadow:0 4px 24px rgba(15,27,45,.10);--sw:240px;--th:56px;--mth:64px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--offwhite);color:var(--text);min-height:100vh;display:flex;overflow:hidden}
#sidebar{width:var(--sw);background:var(--navy);height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;transition:transform .3s;overflow-y:auto}
#sidebar.collapsed{transform:translateX(-100%)}
.sl{padding:20px 20px 14px;border-bottom:1px solid var(--navy-light);display:flex;align-items:center;justify-content:space-between}
.sl-brand{display:flex;flex-direction:column}
.sl .brand{font-size:18px;font-weight:800;color:var(--gold)}
.sl .tag{font-size:10px;color:var(--text-muted);margin-top:2px;letter-spacing:.8px;text-transform:uppercase}
.sb-close{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:5px;flex-shrink:0}
.sb-close:hover{color:var(--gold)}
.ns{padding:10px 0 2px}
.nl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);padding:0 20px 5px}
.ni{display:flex;align-items:center;gap:11px;padding:9px 20px;cursor:pointer;color:#a0aec0;font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .2s}
.ni:hover{background:var(--navy-light);color:#fff}
.ni.active{background:var(--navy-light);color:var(--gold);border-left-color:var(--gold)}
.ni .ic{font-size:16px;width:20px;text-align:center}
.sf{margin-top:auto;padding:14px 20px;border-top:1px solid var(--navy-light);font-size:11px;color:var(--text-muted);text-align:center}
#main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:margin-left .3s}
#main.sb-hidden{margin-left:0!important}
#topbar{height:var(--th);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.tt{font-size:17px;font-weight:800;color:var(--navy)}
.tr{display:flex;align-items:center;gap:10px}
.tdate{font-size:12px;color:var(--text-muted)}
.av{width:34px;height:34px;border-radius:50%;background:var(--navy);color:var(--gold);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
.hb{background:none;border:none;cursor:pointer;font-size:22px;color:var(--navy);padding:4px}
#content{flex:1;overflow-y:auto}
.mod{display:none;min-height:100%}
.mod.active{display:block}
.p24{padding:24px;max-width:1100px;margin:0 auto}
.btn{background:var(--navy);color:var(--gold);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn:hover{background:var(--navy-light)}
.btn-g{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);white-space:nowrap}
.btn-g:hover{border-color:var(--navy);color:var(--navy)}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.ch{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ch h3{font-size:14px;font-weight:800;color:var(--navy)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--white);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.sc .l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:5px}
.sc .v{font-size:22px;font-weight:900;color:var(--navy)}
.sc .s{font-size:11px;color:var(--text-muted);margin-top:3px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--offwhite);padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--offwhite)}
.ab{background:none;border:none;cursor:pointer;font-size:12px;padding:3px 4px;border-radius:4px;color:var(--text-muted)}
.ab:hover{background:var(--offwhite);color:var(--navy)}
.er td{text-align:center;padding:24px;color:var(--text-muted)}
.bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.pb{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:4px 0}
.pf{height:100%;border-radius:4px;transition:width .4s}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.mo.show{opacity:1;pointer-events:all}
.md{background:var(--white);border-radius:16px;padding:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;transform:translateY(10px);transition:transform .25s;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo.show .md{transform:translateY(0)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mh h2{font-size:15px;font-weight:800;color:var(--navy)}
.mc{background:none;border:none;font-size:19px;cursor:pointer;color:var(--text-muted)}
.fi{margin-bottom:12px}
.fi label{display:block;font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.fi input,.fi select,.fi textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--white)}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--gold)}
.fi textarea{resize:vertical;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;margin-top:16px}
.ma .bs{flex:1;background:var(--navy);color:var(--gold);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer}
.ma .bs:hover{background:var(--navy-light)}
.ma .bc{background:none;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;color:var(--text-muted);font-weight:600}
#mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#mob-tb{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--mth);background:var(--white);border-top:1px solid var(--border);z-index:90;justify-content:space-around;align-items:center}
.mt{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 6px;cursor:pointer;font-size:9px;color:var(--text-muted);font-weight:600;flex:1;text-align:center}
.mt .ic{font-size:19px}
.mt.active{color:var(--gold)}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin:20px 0}
.dc{background:var(--white);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.dc:hover{transform:translateY(-2px)}
.dch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted)}
.dcv{font-size:26px;font-weight:900;color:var(--navy)}
.dcs{font-size:11px;color:var(--text-muted);margin-top:3px}
.dr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.dw{background:var(--white);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow)}
.dw h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px}
.dli{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.dli:last-child{border-bottom:none}
.dd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cutoff-row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 28px;gap:6px;align-items:end;margin-bottom:8px}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar.collapsed{transform:translateX(-100%)}
  #mob-ov.show{display:block}
  #main{margin-left:0!important}
  #mob-tb{display:flex}
  #content{padding-bottom:var(--mth)}
  .dr{grid-template-columns:1fr}
  .tdate{display:none}
  #topbar{padding:0 14px}
  .p24{padding:14px}
}
</style>

// ── SIDEBAR COLLAPSE ──
var sbCollapsed=false;
try{sbCollapsed=localStorage.getItem('nmb_sb_collapsed')==='1';}catch(e){}

// ── ATTENDANCE CURRENCY ──
var ATT_CURRENCIES={PHP:{symbol:'₱',rate:1},USD:{symbol:'$',rate:0.0175},SGD:{symbol:'S$',rate:0.0236},AUD:{symbol:'A$',rate:0.0270},GBP:{symbol:'£',rate:0.0137},EUR:{symbol:'€',rate:0.0159},HKD:{symbol:'HK$',rate:0.1369}};
var attDisplayCurrency={};
try{attDisplayCurrency=JSON.parse(localStorage.getItem('nmb_attfx')||'{}');}catch(e){}
function saveAttFX(){try{localStorage.setItem('nmb_attfx',JSON.stringify(attDisplayCurrency));}catch(e){}}
function fmtAmt(amount,jobId){var j=attJobs.find(function(x){return x.id===jobId;});var jc=(j&&j.currency)?j.currency:'PHP';var dc=attDisplayCurrency[jobId]||jc;var c=ATT_CURRENCIES[dc]||ATT_CURRENCIES.PHP;return c.symbol+(amount*c.rate).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function currToggleBtn(jobId){var j=attJobs.find(function(x){return x.id===jobId;});var jc=(j&&j.currency)?j.currency:'PHP';var dc=attDisplayCurrency[jobId]||jc;var opts=['PHP'];if(jc!=='PHP')opts.push(jc);return'<div style="display:flex;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.2)">'+opts.map(function(c){return'<button style="padding:2px 8px;font-size:10px;font-weight:700;border:none;cursor:pointer;background:'+(dc===c?'var(--gold)':'var(--navy-light)')+';color:'+(dc===c?'var(--navy)':'rgba(255,255,255,.7)')+'" data-fx-toggle="'+jobId+'" data-fx-curr="'+c+'">'+c+'</button>';}).join('')+'</div>';}

// ── TIMEZONE ──
var PH_TIMEZONES=['Asia/Manila','UTC','America/New_York','America/Los_Angeles','America/Chicago','Europe/London','Europe/Paris','Australia/Sydney','Asia/Singapore','Asia/Hong_Kong','Asia/Tokyo','Asia/Dubai','Asia/Kolkata'];
function tzLabel(tz){try{var p=new Intl.DateTimeFormat('en',{timeZone:tz,timeZoneName:'short'}).formatToParts(new Date()).find(function(x){return x.type==='timeZoneName';});return tz.replace(/_/g,' ')+(p?' ('+p.value+')':'');}catch(e){return tz;}}
function fmtTimeInTZ(t,tz){if(!t)return'--';var p=t.split(':'),h=+p[0],m=p[1],ap=h>=12?'PM':'AM';h=h%12||12;var base=h+':'+m+' '+ap;return tz&&tz!=='Asia/Manila'?base+' <span style="font-size:10px;color:var(--text-muted)">('+tz.split('/')[1].replace(/_/g,' ')+')</span>':base;}

// ── CUTOFFS ──
function getJobCutoffs(j){if(j.cutoffs&&j.cutoffs.length)return j.cutoffs;var c=[];if(j.c1_start&&j.c1_end)c.push({label:'Period 1',start:j.c1_start,end:j.c1_end,pay:j.c1_pay});if(j.c2_start&&j.c2_end)c.push({label:'Period 2',start:j.c2_start,end:j.c2_end,pay:j.c2_pay});return c;}

// ── FINANCE CALENDAR INTEGRATION ──
function getRecurDates(startDate,recurrence,yr,mo){
  if(!startDate)return[];
  var result=[],sd=new Date(startDate+'T00:00'),dim=new Date(yr,mo+1,0).getDate();
  if(recurrence==='weekly'){for(var d=1;d<=dim;d++){if(new Date(yr,mo,d).getDay()===sd.getDay())result.push(yr+'-'+pad(mo+1)+'-'+pad(d));}}
  else if(recurrence==='monthly'){var day=sd.getDate();if(day<=dim)result.push(yr+'-'+pad(mo+1)+'-'+pad(day));}
  else if(recurrence==='quarterly'){var qm=[sd.getMonth(),(sd.getMonth()+3)%12,(sd.getMonth()+6)%12,(sd.getMonth()+9)%12];if(qm.indexOf(mo)>=0){var qd=sd.getDate();if(qd<=dim)result.push(yr+'-'+pad(mo+1)+'-'+pad(qd));}}
  else if(recurrence==='yearly'){if(sd.getMonth()===mo){var yd=sd.getDate();if(yd<=dim)result.push(yr+'-'+pad(mo+1)+'-'+pad(yd));}}
  return result;
}
function getFinanceCalEvents(){
  var evs=[];
  finIncome.forEach(function(inc){
    if(!inc.recurrence||inc.recurrence==='none')return;
    getRecurDates(inc.date,inc.recurrence,calY,calM).forEach(function(ds){evs.push({id:'finc-'+inc.id+'-'+ds,title:'💚 '+esc(inc.source||'Income')+' ('+peso(inc.amount)+')',start_date:ds,calendar_id:'finances',_fin:true});});
  });
  finDeadlines.forEach(function(dl){
    if(!dl.due_date)return;
    var dates=[];
    if(dl.recurrence&&dl.recurrence!=='none'){dates=getRecurDates(dl.due_date,dl.recurrence,calY,calM);}
    else{var ms2=calY+'-'+pad(calM+1);if(dl.due_date.startsWith(ms2))dates=[dl.due_date];}
    dates.forEach(function(ds){evs.push({id:'find-'+dl.id+'-'+ds,title:(dl.paid?'✅':'🔴')+' '+esc(dl.name||'Bill')+' ('+peso(dl.amount)+')',start_date:ds,calendar_id:'finances',_fin:true});});
  });
  return evs;
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function peso(n){return '₱'+(+n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return n<10?'0'+n:String(n);}
function fmtDate(s){if(!s)return'';var p=s.split('-');return MONTHS_S[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0];}
function daysUntil(ds){if(!ds)return 999;var d=new Date(ds);d.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/864e5);}
function isOD(t){if(t.done||!t.due_date)return false;return new Date(t.due_date+'T'+(t.due_time||'23:59'))<new Date();}
function isToday(t){return t.due_date===todayStr();}

function db(path,opts){opts=opts||{};return fetch(SUPA+'/rest/v1/'+path,{method:opts.method||'GET',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:opts.body}).then(function(r){return r.text().then(function(t){if(!r.ok)throw new Error(t);return t?JSON.parse(t):[];});});}

function saveL(){
  var s=[['nmb_tasks',tasks],['nmb_habits',habits],['nmb_bl',blItems],['nmb_cycles',cycles],['nmb_wtasks',weekTasks],['nmb_glists',groceryLists],['nmb_gitems',groceryItems],['nmb_meals',fitMeals],['nmb_wlogs',weightLogs],['nmb_ajobs',attJobs],['nmb_alogs',attLogs],['nmb_notes',notes],['nmb_slists',shopLists],['nmb_sitems',shopItems]];
  s.forEach(function(x){try{localStorage.setItem(x[0],JSON.stringify(x[1]));}catch(e){}});
  try{localStorage.setItem('nmb_hlogs',JSON.stringify(habitLogs));}catch(e){}
}
function loadL(){
  var s=[['nmb_tasks',tasks],['nmb_habits',habits],['nmb_bl',blItems],['nmb_cycles',cycles],['nmb_wtasks',weekTasks],['nmb_glists',groceryLists],['nmb_gitems',groceryItems],['nmb_meals',fitMeals],['nmb_wlogs',weightLogs],['nmb_ajobs',attJobs],['nmb_alogs',attLogs]];
  s.forEach(function(x){try{var d=JSON.parse(localStorage.getItem(x[0])||'[]');x[1].length=0;d.forEach(function(i){x[1].push(i);});}catch(e){}});
  try{habitLogs=JSON.parse(localStorage.getItem('nmb_hlogs')||'{}');}catch(e){}
  try{fitnessGoals=JSON.parse(localStorage.getItem('nmb_fg')||'{}');}catch(e){}
  try{annualGoals=JSON.parse(localStorage.getItem('nmb_ag')||'null')||annualGoals;}catch(e){}
  try{var nn=JSON.parse(localStorage.getItem('nmb_notes')||'[]');notes.length=0;nn.forEach(function(n){notes.push(n);});}catch(e){}
  try{var sl=JSON.parse(localStorage.getItem('nmb_slists')||'[]');shopLists.length=0;sl.forEach(function(n){shopLists.push(n);});}catch(e){}
  try{var si=JSON.parse(localStorage.getItem('nmb_sitems')||'[]');shopItems.length=0;si.forEach(function(n){shopItems.push(n);});}catch(e){}
  cycIdx=cycles.length?cycles.length-1:0;
}

    attJobs=r[10];attLogs=r[11];finIncome=r[12];finExpenses=r[13];finBudgets=r[14];finSavings=r[15];

function navigate(m){
  curMod=m;
  document.querySelectorAll('.ni').forEach(function(n){n.classList.toggle('active',n.dataset.m===m);});
  document.querySelectorAll('.mt').forEach(function(t){t.classList.toggle('active',t.dataset.m===m);});
  document.querySelectorAll('.mod').forEach(function(x){x.classList.toggle('active',x.id==='mod-'+m);});
  document.getElementById('ttitle').textContent=MOD_TITLES[m]||m;
  closeSB();renderMod(m);
}

}

  var html='<div style="background:var(--white);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10"><h2 style="font-size:15px;font-weight:800;color:var(--navy)">✅ To-Do</h2><div style="display:flex;background:var(--offwhite);border:1px solid var(--border);border-radius:8px;overflow:hidden"><button style="padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:'+(todoView==='daily'?'var(--navy)':'none')+';color:'+(todoView==='daily'?'var(--gold)':'var(--text-muted)')+'" id="tdaily">Daily</button><button style="padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:'+(todoView==='weekly'?'var(--navy)':'none')+';color:'+(todoView==='weekly'?'var(--gold)':'var(--text-muted)')+'" id="tweekly">Weekly</button></div><div style="display:flex;gap:6px">';
  ['all','work','personal'].forEach(function(g){var colors={all:'var(--navy)',work:'#c9a84c',personal:'#7c9de8'};var labels={all:'All',work:'💼 Work',personal:'🏠 Personal'};html+='<div style="padding:5px 12px;border:2px solid '+colors[g]+';cursor:pointer;border-radius:20px;font-size:11px;font-weight:700;background:'+(todoGroup===g?colors[g]:'none')+';color:'+(todoGroup===g?'#fff':colors[g])+'" data-tg="'+g+'">'+labels[g]+'</div>';});
  html+='</div><div style="flex:1"></div><button class="btn" id="btn-add-task">＋ Add Task</button></div><div style="padding:18px 22px" id="todo-body">';
  if(todoView==='daily'){var tod=filtered.filter(function(t){return isToday(t)&&!t.done&&!isOD(t);});var od=filtered.filter(function(t){return isOD(t);});var up=filtered.filter(function(t){return!t.done&&!isOD(t)&&t.due_date&&t.due_date>todayStr();});var dn=filtered.filter(function(t){return t.done;});html+=tSec('📋 Today',tod,false)+tSec('⏰ Overdue',od,true)+tSec('🔭 Upcoming',up,false)+tSec('✅ Done',dn,false);}
  else{html+=renderWeeklyTodo(filtered);}
  html+='</div>';c.innerHTML=html;
  c.querySelector('#tdaily').addEventListener('click',function(){todoView='daily';renderTodo();});
  c.querySelector('#tweekly').addEventListener('click',function(){todoView='weekly';renderTodo();});

function tSec(title,list,isOd){var h='<div style="margin-bottom:20px"><div style="font-size:14px;font-weight:800;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:8px">'+title+'<span style="background:var(--gold-pale);color:var(--gold);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px">'+list.length+'</span></div>';if(!list.length){h+='<div style="text-align:center;padding:20px;font-size:12px;color:var(--text-muted)">'+(isOd?'🎉 No overdue!':'📭 Nothing here')+'</div>';}else{list.forEach(function(t){h+=tCard(t);});}return h+'</div>';}
function tCard(t){var od=isOD(t);var bc=od?'var(--danger)':t.group==='work'?'var(--gold)':'#7c9de8';var h='<div style="background:var(--white);border-radius:10px;border:1px solid var(--border);border-left:3px solid '+bc+';padding:10px 13px;display:flex;align-items:flex-start;gap:9px;margin-bottom:7px'+(t.done?';opacity:.6':'')+'"><div style="width:17px;height:17px;border-radius:50%;border:2px solid '+(t.done?'var(--success)':'var(--border)')+';cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;background:'+(t.done?'var(--success)':'none')+';color:#fff" data-tog="'+t.id+'">'+(t.done?'✓':'')+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text)'+(t.done?';text-decoration:line-through;color:var(--text-muted)':'')+'">'+esc(t.name)+'</div><div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">';if(t.due_date)h+='<span style="font-size:10px;color:'+(od?'var(--danger)':'var(--text-muted)')+'">📅 '+fmtDate(t.due_date)+'</span>';h+='<span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;background:'+(t.group==='work'?'var(--gold-pale)':'#eef1fc')+';color:'+(t.group==='work'?'var(--gold)':'#4a6bc4')+'">'+(t.group==='work'?'💼 Work':'🏠 Personal')+'</span>';if(t.recurring)h+='<span style="font-size:10px;font-weight:700;background:#e8f5ee;color:var(--success);padding:1px 6px;border-radius:8px">🔄 '+esc(t.recurring)+'</span>';h+='</div></div><div style="display:flex;gap:3px"><button class="ab" data-edt="'+t.id+'">✏️</button><button class="ab" data-dlt="'+t.id+'">🗑️</button></div></div>';return h;}
function renderWeeklyTodo(filtered){var now=new Date();var h='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">';for(var i=0;i<7;i++){var d=new Date(now);d.setDate(now.getDate()-now.getDay()+i);var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());var isT=ds===todayStr();var dt=filtered.filter(function(t){return t.due_date===ds;});h+='<div style="background:var(--white);border-radius:10px;border:'+(isT?'2px solid var(--gold)':'1px solid var(--border)')+';overflow:hidden"><div style="padding:7px 9px;background:var(--offwhite);border-bottom:1px solid var(--border);text-align:center"><div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-muted)">'+DAYS[d.getDay()]+'</div><div style="font-size:17px;font-weight:800;color:'+(isT?'var(--gold)':'var(--navy)')+'">'+d.getDate()+'</div></div><div style="padding:5px">';dt.forEach(function(t){var bg=t.done?'#f0f0f0':isOD(t)?'#fdeaea':t.group==='work'?'var(--gold-pale)':'#eef1fc';var col=t.done?'var(--text-muted)':isOD(t)?'var(--danger)':t.group==='work'?'#8a6820':'#4a6bc4';h+='<div style="font-size:10px;padding:3px 6px;border-radius:5px;margin-bottom:3px;cursor:pointer;background:'+bg+';color:'+col+'" data-edt="'+t.id+'">'+(t.done?'✓ ':'')+esc(t.name)+'</div>';});h+='<button style="width:100%;background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-muted);padding:4px;border-top:1px solid var(--border);margin-top:3px" data-add-date="'+ds+'">＋</button></div></div>';}return h+'</div>';}
function togTask(id){var t=tasks.find(function(x){return x.id===id;});if(!t)return;t.done=!t.done;db('tasks?id=eq.'+id,{method:'PATCH',body:JSON.stringify({done:t.done})}).catch(function(){saveL();});renderTodo();renderDash();}
function delTask(id){if(!confirm('Delete?'))return;tasks=tasks.filter(function(t){return t.id!==id;});db('tasks?id=eq.'+id,{method:'DELETE'}).catch(function(){saveL();});renderTodo();renderDash();}
function openTaskMod(editId,preDate){

function calEventsOnDate(ds){
  var manual=calLocalEvents.filter(function(e){
    if(e.recurrence==='none'||!e.recurrence)return e.start_date===ds;
    if(e.recurrence==='daily')return e.start_date<=ds;
    if(e.recurrence==='weekly'){var sd=new Date(e.start_date+'T00:00'),dd=new Date(ds+'T00:00');if(dd<sd)return false;return sd.getDay()===dd.getDay();}
    if(e.recurrence==='monthly')return ds.slice(8)===e.start_date.slice(8)&&ds>=e.start_date;
    if(e.recurrence==='yearly')return ds.slice(5)===e.start_date.slice(5)&&ds>=e.start_date;
    if(e.recurrence==='custom'&&Array.isArray(e.recur_days)){var sd2=new Date(e.start_date+'T00:00'),dd2=new Date(ds+'T00:00');if(dd2<sd2)return false;return e.recur_days.indexOf(dd2.getDay())>=0;}
    return false;
  });
  return manual.concat(getFinanceCalEvents().filter(function(e){return e.start_date===ds;}));
}
