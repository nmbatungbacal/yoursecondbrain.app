<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NMB 2nd Brain</title>
<style>
:root{--navy:#0f1b2d;--navy-light:#1e3150;--gold:#c9a84c;--gold-pale:#f5e9c8;--white:#fff;--offwhite:#f8f6f1;--text:#1a1a2e;--text-muted:#7a8399;--border:#e2ddd4;--success:#4caf7d;--danger:#e05c5c;--warn:#f59e0b;--radius:12px;--shadow:0 4px 24px rgba(15,27,45,.10);--sw:240px;--th:56px;--mth:64px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--offwhite);color:var(--text);min-height:100vh;display:flex;overflow:hidden}
#sidebar{width:var(--sw);background:var(--navy);height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;transition:transform .3s;overflow-y:auto}
.sl{padding:20px 20px 14px;border-bottom:1px solid var(--navy-light)}
.sl .brand{font-size:18px;font-weight:800;color:var(--gold)}
.sl .tag{font-size:10px;color:var(--text-muted);margin-top:2px;letter-spacing:.8px;text-transform:uppercase}
.ns{padding:10px 0 2px}
.nl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);padding:0 20px 5px}
.ni{display:flex;align-items:center;gap:11px;padding:9px 20px;cursor:pointer;color:#a0aec0;font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .2s}
.ni:hover{background:var(--navy-light);color:#fff}
.ni.active{background:var(--navy-light);color:var(--gold);border-left-color:var(--gold)}
.ni .ic{font-size:16px;width:20px;text-align:center}
.sf{margin-top:auto;padding:14px 20px;border-top:1px solid var(--navy-light);font-size:11px;color:var(--text-muted);text-align:center}
#main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{height:var(--th);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.tt{font-size:17px;font-weight:800;color:var(--navy)}
.tr{display:flex;align-items:center;gap:10px}
.tdate{font-size:12px;color:var(--text-muted)}
.av{width:34px;height:34px;border-radius:50%;background:var(--navy);color:var(--gold);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
.hb{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--navy);padding:4px}
#content{flex:1;overflow-y:auto}
.mod{display:none;min-height:100%}
.mod.active{display:block}
.p24{padding:24px;max-width:1100px;margin:0 auto}
.btn{background:var(--navy);color:var(--gold);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn:hover{background:var(--navy-light)}
.btn-g{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);white-space:nowrap}
.btn-g:hover{border-color:var(--navy);color:var(--navy)}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.ch{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ch h3{font-size:14px;font-weight:800;color:var(--navy)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--white);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.sc .l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:5px}
.sc .v{font-size:22px;font-weight:900;color:var(--navy)}
.sc .s{font-size:11px;color:var(--text-muted);margin-top:3px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--offwhite);padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--offwhite)}
.ab{background:none;border:none;cursor:pointer;font-size:12px;padding:3px 4px;border-radius:4px;color:var(--text-muted)}
.ab:hover{background:var(--offwhite);color:var(--navy)}
.er td{text-align:center;padding:24px;color:var(--text-muted)}
.bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.pb{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:4px 0}
.pf{height:100%;border-radius:4px;transition:width .4s}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.mo.show{opacity:1;pointer-events:all}
.md{background:var(--white);border-radius:16px;padding:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;transform:translateY(10px);transition:transform .25s;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo.show .md{transform:translateY(0)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mh h2{font-size:15px;font-weight:800;color:var(--navy)}
.mc{background:none;border:none;font-size:19px;cursor:pointer;color:var(--text-muted)}
.fi{margin-bottom:12px}
.fi label{display:block;font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.fi input,.fi select,.fi textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--white)}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--gold)}
.fi textarea{resize:vertical;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;margin-top:16px}
.ma .bs{flex:1;background:var(--navy);color:var(--gold);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer}
.ma .bs:hover{background:var(--navy-light)}
.ma .bc{background:none;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;color:var(--text-muted);font-weight:600}
#mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#mob-tb{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--mth);background:var(--white);border-top:1px solid var(--border);z-index:90;justify-content:space-around;align-items:center}
.mt{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 6px;cursor:pointer;font-size:9px;color:var(--text-muted);font-weight:600;flex:1;text-align:center}
.mt .ic{font-size:19px}
.mt.active{color:var(--gold)}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin:20px 0}
.dc{background:var(--white);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.dc:hover{transform:translateY(-2px)}
.dch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted)}
.dcv{font-size:26px;font-weight:900;color:var(--navy)}
.dcs{font-size:11px;color:var(--text-muted);margin-top:3px}
.dr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.dw{background:var(--white);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow)}
.dw h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px}
.dli{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.dli:last-child{border-bottom:none}
.dd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #mob-ov.show{display:block}
  #main{margin-left:0}
  #mob-tb{display:flex}
  #content{padding-bottom:var(--mth)}
  .hb{display:block}
  .dr{grid-template-columns:1fr}
  .tdate{display:none}
  #topbar{padding:0 14px}
  .p24{padding:14px}
}
</style>
</head>

<script>
var SUPA='https://wqpkppohxhgolfugpjxp.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxcGtwcG9oeGhnb2xmdWdwanhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDg0MzAsImV4cCI6MjA5MjE4NDQzMH0.1eWxwo6lffeyVRoCW3j6bCQtSYhQYWwBL6FUcrz8FR8';
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_S=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MOD_TITLES={dashboard:'Dashboard',todo:'To-Do & Planner',calendar:'Calendar',twelve:'12 Week Year',fitness:'Fitness Tracker',habits:'Habit Tracker',grocery:'Grocery List',bucketlist:'Bucket List',notes:'Notes',shopping:'Shopping Lists',finance:'Finance',attendance:'Attendance'};

// state
var tasks=[],habits=[],habitLogs={},blItems=[],cycles=[],weekTasks=[];
var groceryLists=[],groceryItems=[];
var fitMeals=[],weightLogs=[],fitnessGoals={};
var calLocalEvents=[],calCalendars=[];
var finIncome=[],finExpenses=[],finBudgets=[],finSavings=[],finDeadlines=[],finDebts=[],finNW=[],finAccounts=[];
var attJobs=[],attLogs=[];
var notes=[],shopLists=[],shopItems=[];
var annualGoals=[{text:'',color:'#c9a84c'},{text:'',color:'#4caf7d'},{text:'',color:'#7c9de8'}];
var curMod='dashboard';
var todoView='daily',todoGroup='all';
// calView, calY, calM, calD now initialized in calendar section
var habY=new Date().getFullYear(),habM=new Date().getMonth();
var blFilter='all',blSearch='',blSort='manual';
var habWeek=Math.ceil((new Date()-new Date(new Date().getFullYear(),0,1))/(7*864e5));
var fitTab='goals',fitMealDate=todayStr();
var finTab='overview',finY=new Date().getFullYear(),finM=new Date().getMonth();
var attTab='overview',attY=new Date().getFullYear(),attM=new Date().getMonth(),attFJ='all';
var cycIdx=0,activeGrocList=null;
var editIds={task:null,habit:null,bl:null,cycle:null,task12:null};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function peso(n){return '\u20B1'+(+n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return n<10?'0'+n:String(n);}
function fmtDate(s){if(!s)return'';var p=s.split('-');return MONTHS_S[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0];}
function fmtShort(d){return MONTHS_S[d.getMonth()]+' '+d.getDate();}
function hexA(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function isOD(t){if(t.done||!t.due_date)return false;return new Date(t.due_date+'T'+(t.due_time||'23:59'))<new Date();}
function isToday(t){return t.due_date===todayStr();}

function db(path,opts){
  opts=opts||{};
  return fetch(SUPA+'/rest/v1/'+path,{
    method:opts.method||'GET',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:opts.body
  }).then(function(r){return r.text().then(function(t){if(!r.ok)throw new Error(t);return t?JSON.parse(t):[];});});
}

function saveL(){
  var s=[['nmb_tasks',tasks],['nmb_habits',habits],['nmb_bl',blItems],['nmb_cycles',cycles],['nmb_wtasks',weekTasks],['nmb_glists',groceryLists],['nmb_gitems',groceryItems],['nmb_meals',fitMeals],['nmb_wlogs',weightLogs],['nmb_ajobs',attJobs],['nmb_alogs',attLogs]];
  s.forEach(function(x){try{localStorage.setItem(x[0],JSON.stringify(x[1]));}catch(e){}});
  try{localStorage.setItem('nmb_hlogs',JSON.stringify(habitLogs));}catch(e){}
}
function loadL(){
  var s=[['nmb_tasks',tasks],['nmb_habits',habits],['nmb_bl',blItems],['nmb_cycles',cycles],['nmb_wtasks',weekTasks],['nmb_glists',groceryLists],['nmb_gitems',groceryItems],['nmb_meals',fitMeals],['nmb_wlogs',weightLogs],['nmb_ajobs',attJobs],['nmb_alogs',attLogs]];
  s.forEach(function(x){try{var d=JSON.parse(localStorage.getItem(x[0])||'[]');x[1].length=0;d.forEach(function(i){x[1].push(i);});}catch(e){}});
  try{habitLogs=JSON.parse(localStorage.getItem('nmb_hlogs')||'{}');}catch(e){}
  try{fitnessGoals=JSON.parse(localStorage.getItem('nmb_fg')||'{}');}catch(e){}
  try{annualGoals=JSON.parse(localStorage.getItem('nmb_ag')||'null')||annualGoals;}catch(e){}
  try{var cc=JSON.parse(localStorage.getItem('nmb_cals_v2')||'null');if(cc&&cc.length)calCals=cc;}catch(e){}
  cycIdx=cycles.length?cycles.length-1:0;
}

function init(){
  loadL();
  Promise.all([
    db('tasks?order=sort_order.asc,created_at.asc').catch(function(){return[];}),
    db('habits?order=sort_order.asc').catch(function(){return[];}),
    db('habit_logs').catch(function(){return[];}),
    db('bucket_list?order=sort_order.asc').catch(function(){return[];}),
    db('twelve_week_cycles?order=created_at.asc').catch(function(){return[];}),
    db('twelve_week_tasks?order=sort_order.asc').catch(function(){return[];}),
    db('grocery_lists?order=created_at.desc').catch(function(){return[];}),
    db('grocery_items?order=sort_order.asc').catch(function(){return[];}),
    db('fitness_meals?order=logged_date.desc').catch(function(){return[];}),
    db('fitness_weight_logs?order=logged_date.desc').catch(function(){return[];}),
    db('att_jobs?order=created_at.asc').catch(function(){return[];}),
    db('att_logs?order=log_date.desc').catch(function(){return[];}),
    db('fin_income?order=date.desc').catch(function(){return[];}),
    db('fin_expenses?order=date.desc').catch(function(){return[];}),
    db('fin_budgets').catch(function(){return[];}),
    db('fin_savings').catch(function(){return[];}),
    db('fin_deadlines?order=due_date.asc').catch(function(){return[];}),
    db('fin_debts').catch(function(){return[];}),
    db('fin_networth').catch(function(){return[];}),
    db('fin_accounts').catch(function(){return[];})
  ]).then(function(r){
    tasks=r[0];habits=r[1];
    r[2].forEach(function(l){habitLogs[l.habit_id+'_'+l.logged_date]=l.completed;});
    blItems=r[3];
    cycles=r[4];cycles.forEach(function(c){if(typeof c.goals==='string'){try{c.goals=JSON.parse(c.goals);}catch(e){c.goals=[];}}});
    weekTasks=r[5];groceryLists=r[6];groceryItems=r[7];
    fitMeals=r[8];weightLogs=r[9];attJobs=r[10];attLogs=r[11];
    finIncome=r[12];finExpenses=r[13];finBudgets=r[14];finSavings=r[15];
    finDeadlines=r[16];finDebts=r[17];finNW=r[18];finAccounts=r[19];
    cycIdx=cycles.length?cycles.length-1:0;
    renderAll();
  }).catch(function(){renderAll();});
}

function navigate(m){
  curMod=m;
  document.querySelectorAll('.ni').forEach(function(n){n.classList.toggle('active',n.dataset.m===m);});
  document.querySelectorAll('.mt').forEach(function(t){t.classList.toggle('active',t.dataset.m===m);});
  document.querySelectorAll('.mod').forEach(function(x){x.classList.toggle('active',x.id==='mod-'+m);});
  document.getElementById('ttitle').textContent=MOD_TITLES[m]||m;
  closeSB();
  renderMod(m);
}
function renderAll(){updateDT();renderMod('dashboard');}
function renderMod(m){
  if(m==='dashboard')renderDash();
  else if(m==='todo')renderTodo();
  else if(m==='calendar')renderCal();
  else if(m==='twelve')renderTwelve();
  else if(m==='fitness')renderFit();
  else if(m==='habits')renderHab();
  else if(m==='grocery')renderGroc();
  else if(m==='bucketlist')renderBL();
  else if(m==='finance')renderFin();
  else if(m==='attendance')renderAtt();
  else if(m==='notes')renderNotes();
  else if(m==='shopping')renderShop();
}
function updateDT(){
  var d=new Date(),h=d.getHours();
  var g=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  var ge=document.getElementById('dash-greeting');if(ge)ge.textContent=g+', Nikki \uD83D\uDC4B';
  var de=document.getElementById('tdate');if(de)de.textContent=MONTHS_S[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

// ── DASHBOARD ──
function renderDash(){
  updateDT();
  var todT=tasks.filter(function(t){return isToday(t)&&!t.done;});
  var odT=tasks.filter(function(t){return isOD(t);});
  var ms=finY+'-'+pad(finM+1);
  var inc=finIncome.filter(function(i){return i.date&&i.date.startsWith(ms);}).reduce(function(s,i){return s+(+i.amount||0);},0);
  var exp=finExpenses.filter(function(e){return e.date&&e.date.startsWith(ms);}).reduce(function(s,e){return s+(+e.amount||0);},0);
  var saved=finSavings.reduce(function(s,g){return s+(+g.current_amount||0);},0);

var calLocalEvents=[];

if(!calCalendars.length)calCalendars=[{id:'default',name:'Personal',color:'#4285f4'},{id:'work',name:'Work',color:'#c9a84c'}];

function saveCalData(){
  try{localStorage.setItem('nmb_cal_events',JSON.stringify(calLocalEvents));}catch(e){}
  try{localStorage.setItem('nmb_calendars',JSON.stringify(calCalendars));}catch(e){}
}

function calEventsOnDate(ds){
  return calLocalEvents.filter(function(e){
    if(e.recurrence==='none'||!e.recurrence)return e.start_date===ds;
    if(e.recurrence==='daily')return e.start_date<=ds;
    if(e.recurrence==='weekly'){
      var sd=new Date(e.start_date+'T00:00');var dd=new Date(ds+'T00:00');
      if(dd<sd)return false;
      return sd.getDay()===dd.getDay();
    }
    if(e.recurrence==='monthly'){
      var sd2=new Date(e.start_date+'T00:00');
      return ds.slice(8)===e.start_date.slice(8)&&ds>=e.start_date;
    }
    if(e.recurrence==='yearly'){
      return ds.slice(5)===e.start_date.slice(5)&&ds>=e.start_date;
    }
    if(e.recurrence==='custom'&&Array.isArray(e.recur_days)){
      var sd3=new Date(e.start_date+'T00:00');var dd3=new Date(ds+'T00:00');
      if(dd3<sd3)return false;
      return e.recur_days.indexOf(dd3.getDay())>=0;
    }
    return false;
  });
}

        h+='<div style="background:'+esc(cal.color)+'22;border-left:2px solid '+esc(cal.color)+';padding:1px 4px;border-radius:2px;font-size:10px;color:var(--text);margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;cursor:pointer;white-space:nowrap" data-cal-ev="'+ev.id+'">'+esc(ev.title||'')+'</div>';
      });

  }
}

function openCalEventModal(editId,prefillDate){

  var body='<div class="fi"><label>Title *</label><input id="cev-title" value="'+esc(item?item.title||'':'')+'"/></div>';
  body+='<div class="fr"><div class="fi"><label>Date *</label><input id="cev-date" type="date" value="'+(item?item.start_date:prefillDate||todayStr())+'"/></div><div class="fi"><label>Calendar</label><select id="cev-cal">'+calOpts+'</select></div></div>';
  body+='<div class="fr"><div class="fi"><label>Start Time</label><input id="cev-stime" type="time" value="'+(item?item.start_time||'':'')+'"/></div><div class="fi"><label>End Time</label><input id="cev-etime" type="time" value="'+(item?item.end_time||'':'')+'"/></div></div>';

  body+='<div id="cev-recur-days" style="display:'+(item&&item.recurrence==='custom'?'block':'none')+'"><div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">Repeat on</div><div style="display:flex;gap:6px;flex-wrap:wrap">'+dowBtns+'</div></div>';
  body+='<input type="hidden" id="cev-rdays" value="'+JSON.stringify(recurDays).replace(/"/g,'&quot;')+'"/>';
  body+='<div class="fi"><label>Location</label><input id="cev-loc" value="'+esc(item?item.location||'':'')+'"/></div>';
  body+='<div class="fi"><label>Notes</label><textarea id="cev-notes" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;min-height:60px;resize:vertical">'+esc(item?item.notes||'':'')+'</textarea></div>';
  mo.innerHTML='<div class="md"><div class="mh"><h2>'+(editId?'Edit Event':'New Event')+'</h2><button class="mc" id="cevmo-x">&times;</button></div>'+body+'<div class="ma">'+(editId?'<button class="bc" id="cevmo-del" style="border:1px solid var(--danger);color:var(--danger)">Delete</button>':''  )+'<button class="bc" id="cevmo-cancel">Cancel</button><button class="bs" id="cevmo-save">Save</button></div></div>';
  document.body.appendChild(mo);
  var close=function(){if(mo.parentNode)mo.parentNode.removeChild(mo);};
  mo.querySelector('#cevmo-x').addEventListener('click',close);mo.querySelector('#cevmo-cancel').addEventListener('click',close);mo.addEventListener('click',function(e){if(e.target===mo)close();});
  if(editId){var delBtn=mo.querySelector('#cevmo-del');if(delBtn)delBtn.addEventListener('click',function(){if(!confirm('Delete event?'))return;calLocalEvents=calLocalEvents.filter(function(x){return x.id!==editId;});saveCalData();close();renderCalBody();});}
  // Recurrence toggle
  var recurSel=mo.querySelector('#cev-recur');var recurDayDiv=mo.querySelector('#cev-recur-days');
  recurSel.addEventListener('change',function(){recurDayDiv.style.display=this.value==='custom'?'block':'none';});
  // Day toggles
  var selRDays=recurDays.slice();
  mo.querySelectorAll('.rdow-btn').forEach(function(b){b.addEventListener('click',function(){
    var dow=+b.dataset.rdow;var idx=selRDays.indexOf(dow);
    if(idx>=0){selRDays.splice(idx,1);b.style.borderColor='var(--border)';b.style.background='none';b.style.color='var(--text-muted)';}
    else{selRDays.push(dow);b.style.borderColor='var(--navy)';b.style.background='var(--navy)';b.style.color='var(--gold)';}
    document.getElementById('cev-rdays').value=JSON.stringify(selRDays);

  setTimeout(function(){var t=mo.querySelector('#cev-title');if(t)t.focus();},50);

    var data={title:title,start_date:document.getElementById('cev-date').value||todayStr(),calendar_id:document.getElementById('cev-cal').value,start_time:document.getElementById('cev-stime').value||null,end_time:document.getElementById('cev-etime').value||null,recurrence:recur,recur_days:recur==='custom'?rdays:null,location:document.getElementById('cev-loc').value.trim(),notes:document.getElementById('cev-notes').value.trim()};

    else{calLocalEvents.push(Object.assign({id:uid(),created_at:new Date().toISOString()},data));}
    saveCalData();close();renderCalBody();
  });

function renderTwelve(){
  var c=document.getElementById('twelve-inner');

    ag+='<div style="background:rgba(255,255,255,.07);border-radius:10px;padding:12px 14px">';

  ag+='</div>';

  // 12 weeks grid
  var weeksHtml='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">';
  for(var w=1;w<=12;w++){
    var wt=weekTasks.filter(function(t){return t.week===w;});
    var done=wt.filter(function(t){return t.done;}).length;
    var pct=wt.length?Math.round(done/wt.length*100):0;
    var isNow=w===habWeek;
    weeksHtml+='<div class="card" style="border:'+(isNow?'2px solid var(--gold)':'1px solid var(--border)')+'"><div style="padding:12px 16px;background:'+(isNow?'var(--navy)':'var(--offwhite)')+';display:flex;align-items:center;justify-content:space-between">';
    weeksHtml+='<div style="font-size:13px;font-weight:800;color:'+(isNow?'var(--gold)':'var(--navy)')+'">Week '+w+(isNow?' ← Now':''  )+'</div>';
    if(wt.length)weeksHtml+='<div style="font-size:11px;color:'+(isNow?'rgba(255,255,255,.7)':'var(--text-muted)')+'">'+done+'/'+wt.length+' ('+pct+'%)</div>';
    weeksHtml+='</div>';
    if(wt.length){
      weeksHtml+='<div class="pb" style="height:4px;border-radius:0"><div class="pf" style="width:'+pct+'%;background:var(--gold)"></div></div>';
    }
    weeksHtml+='<div style="padding:10px 14px">';
    if(!wt.length){weeksHtml+='<div style="font-size:12px;color:var(--text-muted);font-style:italic">No goals set for this week</div>';}
    wt.forEach(function(t){
      weeksHtml+='<div style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)">';
      weeksHtml+='<button data-wt-tog="'+t.id+'" style="width:16px;height:16px;border-radius:3px;border:1.5px solid '+(t.done?'var(--success)':'var(--border)')+';background:'+(t.done?'var(--success)':'none')+';cursor:pointer;flex-shrink:0;margin-top:2px;font-size:9px;color:#fff">'+(t.done?'✓':'')+'</button>';
      weeksHtml+='<div style="flex:1;font-size:12px;color:'+(t.done?'var(--text-muted)':'var(--text)')+';text-decoration:'+(t.done?'line-through':'none')+'">'+esc(t.text||'')+'</div>';
      weeksHtml+='<div style="display:flex;gap:2px;flex-shrink:0"><button class="ab" style="font-size:10px;padding:2px 4px" data-wt-edit="'+t.id+'">&#9999;</button><button class="ab" style="font-size:10px;padding:2px 4px;color:var(--danger)" data-wt-del="'+t.id+'">&times;</button></div>';
      weeksHtml+='</div>';
    });

    weeksHtml+='</div></div>';

      annualGoals[i].text=el?el.value:'';
    });

    var btn=c.querySelector('#btn-save-vision');
    if(btn){btn.textContent='Saved!';setTimeout(function(){btn.textContent='Save Vision';},1500);}
  });

  // Toggle week task

    var id=b.dataset.wtTog;var idx=weekTasks.findIndex(function(x){return x.id===id;});if(idx<0)return;

    renderTwelve();
  });});

  // Delete week task
  c.querySelectorAll('[data-wt-del]').forEach(function(b){b.addEventListener('click',function(){
    if(!confirm('Delete this goal?'))return;
    var id=b.dataset.wtDel;weekTasks=weekTasks.filter(function(x){return x.id!==id;});
    db('week_tasks?id=eq.'+id,{method:'DELETE'}).catch(function(){saveL();});renderTwelve();
  });});

  // Edit week task
  c.querySelectorAll('[data-wt-edit]').forEach(function(b){b.addEventListener('click',function(){
    var id=b.dataset.wtEdit;var t=weekTasks.find(function(x){return x.id===id;});if(!t)return;
    var mo=document.createElement('div');mo.className='mo show';
    mo.innerHTML='<div class="md"><div class="mh"><h2>Edit Week '+t.week+' Goal</h2><button class="mc" id="wte-x">&times;</button></div><div class="fi"><label>Goal</label><textarea id="wte-text" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;min-height:80px;resize:vertical">'+esc(t.text||'')+'</textarea></div><div class="ma"><button class="bc" id="wte-cancel">Cancel</button><button class="bs" id="wte-save">Save</button></div></div>';
    document.body.appendChild(mo);
    var close=function(){if(mo.parentNode)mo.parentNode.removeChild(mo);};
    mo.querySelector('#wte-x').addEventListener('click',close);mo.querySelector('#wte-cancel').addEventListener('click',close);mo.addEventListener('click',function(e){if(e.target===mo)close();});
    mo.querySelector('#wte-save').addEventListener('click',function(){
      var text=document.getElementById('wte-text').value.trim();if(!text)return;
      var idx=weekTasks.findIndex(function(x){return x.id===id;});if(idx>=0)weekTasks[idx].text=text;
      db('week_tasks?id=eq.'+id,{method:'PATCH',body:JSON.stringify({text:text})}).catch(function(){saveL();});
      close();renderTwelve();
    });
    setTimeout(function(){var el=document.getElementById('wte-text');if(el){el.focus();el.select();}},50);
  });});

  // Add week goal
  c.querySelectorAll('[data-add-week]').forEach(function(b){b.addEventListener('click',function(){
    var wk=+b.dataset.addWeek;
    var mo=document.createElement('div');mo.className='mo show';
    mo.innerHTML='<div class="md"><div class="mh"><h2>Add Week '+wk+' Goal</h2><button class="mc" id="wta-x">&times;</button></div><div class="fi"><label>Goal</label><textarea id="wta-text" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;min-height:80px;resize:vertical" placeholder="What do you want to achieve this week?"></textarea></div><div class="ma"><button class="bc" id="wta-cancel">Cancel</button><button class="bs" id="wta-save">Add Goal</button></div></div>';
    document.body.appendChild(mo);
    var close=function(){if(mo.parentNode)mo.parentNode.removeChild(mo);};
    mo.querySelector('#wta-x').addEventListener('click',close);mo.querySelector('#wta-cancel').addEventListener('click',close);mo.addEventListener('click',function(e){if(e.target===mo)close();});
    setTimeout(function(){var el=document.getElementById('wta-text');if(el)el.focus();},50);
    mo.querySelector('#wta-save').addEventListener('click',function(){
      var text=document.getElementById('wta-text').value.trim();if(!text)return;
      var nt={id:uid(),week:wk,text:text,done:false,created_at:new Date().toISOString()};
      weekTasks.push(nt);db('week_tasks',{method:'POST',body:JSON.stringify(nt)}).catch(function(){saveL();});
      close();renderTwelve();
    });
  });});

// -- FITNESS --
var useMetric=true;
var editMealId=null,editWeightId=null;

function kgToLbs(kg){return kg?Math.round((+kg)*2.20462*10)/10:0;}
function lbsToKg(lbs){return lbs?+(+lbs/2.20462).toFixed(2):0;}
function toDisplayW2(kg){return useMetric?+(+kg).toFixed(1):kgToLbs(+kg);}
function toDisplayH2(cm){return useMetric?+(+cm).toFixed(0):+(+cm/2.54).toFixed(1);}
function toDisplayL(cm){return useMetric?+(+cm).toFixed(1):+(+cm/2.54).toFixed(1);}
function weightUnit2(){return useMetric?'kg':'lbs';}
function lenUnit2(){return useMetric?'cm':'in';}

function renderFit(){
  try{useMetric=localStorage.getItem('nmb_fit_unit')!=='lbs';}catch(e){}
  var c=document.getElementById('fit-inner');
  var tabs=['goals','meals'];
  var tlbls=['Goals & Weight','Meals & Calories'];
  var html='<div style="background:var(--white);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10">';
  html+='<h2 style="font-size:15px;font-weight:800;color:var(--navy)">&#x1F4AA; Fitness</h2>';
  html+='<div style="display:flex;background:var(--offwhite);border:1px solid var(--border);border-radius:8px;overflow:hidden">';
  html+='<button style="padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:'+(useMetric?'var(--navy)':'none')+';color:'+(useMetric?'var(--gold)':'var(--text-muted)')+'" id="fit-unit-kg">kg/cm</button>';
  html+='<button style="padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:'+(!useMetric?'var(--navy)':'none')+';color:'+(!useMetric?'var(--gold)':'var(--text-muted)')+'" id="fit-unit-lbs">lbs/in</button>';
  html+='</div>';
  html+='<div style="display:flex;background:var(--offwhite);border:1px solid var(--border);border-radius:8px;overflow:hidden">';
  tabs.forEach(function(t,i){html+='<button style="padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:'+(fitTab===t?'var(--navy)':'none')+';color:'+(fitTab===t?'var(--gold)':'var(--text-muted)')+'" data-fittab="'+t+'">'+tlbls[i]+'</button>';});
  html+='</div>';
  html+='<div style="flex:1"></div>';
  if(fitTab==='meals')html+='<button class="btn" id="fit-add-btn">&#65291; Log Meal</button>';
  html+='</div>';
  html+='<div style="padding:18px 22px" id="fit-body">';
  if(fitTab==='goals')html+=renderFitGoals2();
  else html+=renderFitMeals2();
  html+='</div>';
  c.innerHTML=html;
  c.querySelectorAll('[data-fittab]').forEach(function(b){b.addEventListener('click',function(){fitTab=b.dataset.fittab;renderFit();});});
  var fab=c.querySelector('#fit-add-btn');
  if(fab)fab.addEventListener('click',function(){openFitMealModal(null);});
  var ukg=c.querySelector('#fit-unit-kg');if(ukg)ukg.addEventListener('click',function(){useMetric=true;try{localStorage.setItem('nmb_fit_unit','kg');}catch(e){}renderFit();});
  var ulbs=c.querySelector('#fit-unit-lbs');if(ulbs)ulbs.addEventListener('click',function(){useMetric=false;try{localStorage.setItem('nmb_fit_unit','lbs');}catch(e){}renderFit();});
  var ogsb=c.querySelector('#btn-fit-goals-settings');if(ogsb)ogsb.addEventListener('click',openFitGoalsModal);
  var blwq=c.querySelector('#btn-log-weight');if(blwq)blwq.addEventListener('click',function(){openFitWeightModal(null);});
  var mp=c.querySelector('#fit-meal-prev');if(mp)mp.addEventListener('click',function(){var d=new Date(fitMealDate+'T00:00');d.setDate(d.getDate()-1);fitMealDate=d.toISOString().slice(0,10);renderFit();});
  var mn=c.querySelector('#fit-meal-next');if(mn)mn.addEventListener('click',function(){var d=new Date(fitMealDate+'T00:00');d.setDate(d.getDate()+1);fitMealDate=d.toISOString().slice(0,10);renderFit();});
  var mt=c.querySelector('#fit-meal-today');if(mt)mt.addEventListener('click',function(){fitMealDate=todayStr();renderFit();});
  c.querySelectorAll('[data-edit-meal]').forEach(function(b){b.addEventListener('click',function(){openFitMealModal(b.dataset.editMeal);});});
  c.querySelectorAll('[data-del-meal]').forEach(function(b){b.addEventListener('click',function(){if(!confirm('Delete this meal?'))return;fitMeals=fitMeals.filter(function(m){return m.id!==b.dataset.delMeal;});db('fitness_meals?id=eq.'+b.dataset.delMeal,{method:'DELETE'}).catch(function(){saveL();});renderFit();});});
  c.querySelectorAll('[data-edit-we]').forEach(function(b){b.addEventListener('click',function(){openFitWeightModal(b.dataset.editWe);});});
  c.querySelectorAll('[data-del-we]').forEach(function(b){b.addEventListener('click',function(){if(!confirm('Delete?'))return;weightLogs=weightLogs.filter(function(l){return l.id!==b.dataset.delWe;});db('fitness_weight_logs?id=eq.'+b.dataset.delWe,{method:'DELETE'}).catch(function(){saveL();});renderFit();});});
}

function renderFitGoals2(){
  var g=fitnessGoals;
  var lw=weightLogs.length?weightLogs[0]:null;
  var wDisp=lw&&lw.weight?toDisplayW2(lw.weight).toFixed(1):null;
  var gwDisp=g.weight_goal?toDisplayW2(g.weight_goal).toFixed(1):null;
  var bmi='--',bmiCat='',bmiColor='var(--text-muted)';
  if(lw&&lw.weight&&g.height_cm){var b=(lw.weight/Math.pow(g.height_cm/100,2)).toFixed(1);bmi=b;if(b<18.5){bmiCat='Underweight';bmiColor='#4a6bc4';}else if(b<25){bmiCat='Normal ✅';bmiColor='var(--success)';}else if(b<30){bmiCat='Overweight';bmiColor='var(--warn)';}else{bmiCat='Obese';bmiColor='var(--danger)';}}
  var sevenAgo=new Date();sevenAgo.setDate(sevenAgo.getDate()-6);var sas=sevenAgo.toISOString().slice(0,10);
  var rMeals=fitMeals.filter(function(m){return m.logged_date>=sas;});
  var avgCal=0;if(rMeals.length){var days2={};rMeals.forEach(function(m){days2[m.logged_date]=(days2[m.logged_date]||0)+(+m.calories||0);});var vals=Object.values(days2);avgCal=Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);}
  var wPct=0;if(g.weight_start&&g.weight_goal&&lw&&lw.weight&&g.weight_start!==g.weight_goal){wPct=Math.min(100,Math.max(0,Math.round((g.weight_start-lw.weight)/(g.weight_start-g.weight_goal)*100)));}
  var bfLw=weightLogs.find(function(l){return l.body_fat;});
  var bfPct=0;if(g.bf_start&&g.bf_goal&&bfLw){bfPct=Math.min(100,Math.max(0,Math.round((g.bf_start-bfLw.body_fat)/(g.bf_start-g.bf_goal)*100)));}

  var h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:20px">';

  // Weight card
  h+='<div class="card" style="padding:16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px">&#x2696;&#xFE0F; Weight</div>';
  h+='<div><span style="font-size:26px;font-weight:900;color:var(--navy)">'+(wDisp||'--')+'</span><span style="font-size:13px;color:var(--text-muted);margin-left:3px">'+weightUnit2()+'</span></div>';
  if(g.weight_goal&&lw&&lw.weight){var diff=lw.weight-g.weight_goal;h+='<div style="font-size:12px;color:var(--text-muted);margin-top:4px">'+(diff>0?toDisplayW2(diff).toFixed(1)+' '+weightUnit2()+' to goal':'&#x1F389; Goal reached!')+'</div>';}
  else h+='<div style="font-size:12px;color:var(--text-muted);margin-top:4px">No goal set</div>';
  if(wPct>0){h+='<div class="pb" style="margin-top:8px"><div class="pf" style="width:'+wPct+'%;background:var(--gold)"></div></div><div style="font-size:11px;color:var(--text-muted);margin-top:3px">'+wPct+'% to goal · '+( gwDisp||'--')+' '+weightUnit2()+'</div>';}
  h+='</div>';

  // BMI card
  h+='<div class="card" style="padding:16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px">&#x1F4CA; BMI</div>';
  h+='<div><span style="font-size:26px;font-weight:900;color:var(--navy)">'+bmi+'</span></div>';
  h+='<div style="font-size:12px;font-weight:700;color:'+bmiColor+';margin-top:4px">'+bmiCat+'</div>';
  if(g.height_cm)h+='<div style="font-size:11px;color:var(--text-muted);margin-top:3px">Height: '+toDisplayH2(g.height_cm)+' '+lenUnit2()+'</div>';
  h+='</div>';

  // Body fat card
  h+='<div class="card" style="padding:16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px">&#x1F525; Body Fat</div>';
  h+='<div><span style="font-size:26px;font-weight:900;color:var(--navy)">'+(bfLw&&bfLw.body_fat?bfLw.body_fat:'--')+'</span><span style="font-size:13px;color:var(--text-muted);margin-left:3px">%</span></div>';
  if(g.bf_goal)h+='<div style="font-size:12px;color:var(--text-muted);margin-top:4px">Goal: '+g.bf_goal+'%</div>';
  else h+='<div style="font-size:12px;color:var(--text-muted);margin-top:4px">No goal set</div>';
  if(bfPct>0){h+='<div class="pb" style="margin-top:8px"><div class="pf" style="width:'+bfPct+'%;background:#7c9de8"></div></div><div style="font-size:11px;color:var(--text-muted);margin-top:3px">'+bfPct+'% progress</div>';}
  h+='</div>';

  // Calories card
  h+='<div class="card" style="padding:16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px">&#x1F37D;&#xFE0F; Calories</div>';
  h+='<div style="display:flex;gap:10px;margin-top:4px">';
  h+='<div style="flex:1;background:var(--offwhite);border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:var(--navy)">'+(g.cal_ideal||'--')+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">Ideal/day</div></div>';
  h+='<div style="flex:1;background:var(--offwhite);border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:var(--navy)">'+(avgCal||'--')+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">7-day avg</div></div>';
  h+='</div>';
  if(g.cal_ideal&&avgCal){var def2=g.cal_ideal-avgCal;h+='<div style="text-align:center;margin-top:8px;font-size:11px;font-weight:700;padding:4px 8px;border-radius:10px;background:'+(def2>0?'#e8f5ee':'#fdeaea')+';color:'+(def2>0?'var(--success)':'var(--danger)')+'">'+( def2>0?'Avg deficit: '+def2+' kcal':'Avg surplus: '+Math.abs(def2)+' kcal')+'</div>';}
  h+='</div>';

  h+='</div>';

  // Action buttons
  h+='<div style="display:flex;gap:10px;margin-bottom:20px">';
  h+='<button class="btn" id="btn-log-weight">&#65291; Log Weight</button>';
  h+='<button class="btn-g" id="btn-fit-goals-settings">&#x2699;&#xFE0F; Edit Goals</button>';
  h+='</div>';

  // Weight log table
  h+='<div style="font-size:15px;font-weight:800;color:var(--navy);margin-bottom:12px">Weight Log</div>';
  h+='<div class="card"><table class="tbl"><thead><tr>';
  h+='<th>Date</th><th>Weight ('+weightUnit2()+')</th><th>Body Fat %</th><th>Change</th><th>Waist ('+lenUnit2()+')</th><th>Hip ('+lenUnit2()+')</th><th>Notes</th><th></th>';
  h+='</tr></thead><tbody>';
  if(!weightLogs.length){h+='<tr class="er"><td colspan="8">No entries yet. Click + Log Weight to start tracking.</td></tr>';}
  else{
    weightLogs.forEach(function(l,i){
      var prev=weightLogs[i+1];
      var delta=prev&&l.weight&&prev.weight?(toDisplayW2(l.weight)-toDisplayW2(prev.weight)).toFixed(1):null;
      h+='<tr>';
      h+='<td>'+fmtDate(l.logged_date)+'</td>';
      h+='<td style="font-weight:700">'+(l.weight?toDisplayW2(l.weight).toFixed(1):'--')+'</td>';
      h+='<td>'+(l.body_fat?l.body_fat+'%':'--')+'</td>';
      h+='<td>'+(delta!==null?'<span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px;background:'+(+delta<0?'#e8f5ee':'#fdeaea')+';color:'+(+delta<0?'var(--success)':'var(--danger)')+'">'+( +delta<0?delta:'+'+delta)+' '+weightUnit2()+'</span>':'--')+'</td>';
      h+='<td>'+(l.waist?toDisplayL(l.waist).toFixed(1):'--')+'</td>';
      h+='<td>'+(l.hip?toDisplayL(l.hip).toFixed(1):'--')+'</td>';
      h+='<td style="font-size:12px;color:var(--text-muted)">'+esc(l.notes||'')+'</td>';
      h+='<td style="white-space:nowrap"><button class="ab" data-edit-we="'+l.id+'">&#9999;&#xFE0F;</button><button class="ab" style="color:var(--danger)" data-del-we="'+l.id+'">&times;</button></td>';
      h+='</tr>';
    });
  }
  h+='</tbody></table></div>';
  return h;
}

function renderFitMeals2(){
  var dayMeals=fitMeals.filter(function(m){return m.logged_date===fitMealDate;});
  var total=dayMeals.reduce(function(s,m){return s+(+m.calories||0);},0);
  var totalP=dayMeals.reduce(function(s,m){return s+(+m.protein||0);},0);
  var totalC=dayMeals.reduce(function(s,m){return s+(+m.carbs||0);},0);
  var ideal=fitnessGoals.cal_ideal||0;
  var def=ideal&&total?(ideal-total):null;

  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">';
  h+='<button class="ab" id="fit-meal-prev" style="background:var(--white);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;font-size:14px">&#8249;</button>';
  h+='<div style="font-size:14px;font-weight:700;color:var(--navy);min-width:140px;text-align:center">'+fmtDate(fitMealDate)+'</div>';
  h+='<button class="ab" id="fit-meal-next" style="background:var(--white);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;font-size:14px">&#8250;</button>';
  h+='<button class="btn-g" id="fit-meal-today" style="font-size:11px;padding:5px 10px">Today</button></div>';

  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px">';
  h+='<div style="background:var(--white);border-radius:10px;padding:13px 15px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:800;color:var(--navy)">'+total+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.6px">Calories</div></div>';
  h+='<div style="background:var(--white);border-radius:10px;padding:13px 15px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:800;color:var(--navy)">'+(ideal||'--')+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.6px">Ideal</div></div>';
  h+='<div style="background:var(--white);border-radius:10px;padding:13px 15px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:800;color:'+(def===null?'var(--navy)':def>0?'var(--success)':'var(--danger)')+'">'+( def===null?'--':Math.abs(def))+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.6px">'+(def===null?'Deficit':def>0?'Deficit ✅':'Surplus ⚠️')+'</div></div>';
  h+='<div style="background:var(--white);border-radius:10px;padding:13px 15px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:800;color:var(--navy)">'+dayMeals.length+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.6px">Meals</div></div>';

// -- HABITS --
var habDayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function isDayApp(h,date){
  var dow=date.getDay();
  if(h.frequency==='daily')return true;
  if(h.frequency==='weekdays')return dow>=1&&dow<=5;
  if(h.frequency==='weekends')return dow===0||dow===6;
  if(h.frequency==='mwf')return dow===1||dow===3||dow===5;
  if(h.frequency==='tts')return dow===2||dow===4||dow===6;
  if(h.frequency==='custom'&&Array.isArray(h.custom_days))return h.custom_days.indexOf(dow)>=0;
  return true;
}

function renderHab(){
  var c=document.getElementById('hab-inner');
  var dim=new Date(habY,habM+1,0).getDate();

  html+='</div></div>';

  if(!habits.length){
    html+='<div class="card"><div style="text-align:center;padding:40px;color:var(--text-muted)"><div style="font-size:32px;margin-bottom:10px">🔄</div><div>No habits yet. Click + Add Habit to start tracking.</div></div></div>';
  } else {
    // Days header
    var dayNums=[];for(var d=1;d<=dim;d++)dayNums.push(d);
    html+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;min-width:600px"><thead><tr>';

      var dayDate=new Date(habY,habM,d);
      var dow=dayDate.getDay();
      html+='<th style="padding:4px 2px;font-size:9px;color:'+(isToday?'var(--gold)':'var(--text-muted)')+';font-weight:'+(isToday?'800':'600')+';text-align:center;width:28px">';
      html+=habDayNames[dow][0]+'<br>'+d+'</th>';
    }
    html+='</tr></thead><tbody>';

    habits.forEach(function(h){
      var logs=habitLogs[h.id]||{};
      var appDays=0,doneDays=0;
      for(var d=1;d<=dim;d++){var dt=new Date(habY,habM,d);if(isDayApp(h,dt)){appDays++;if(logs[habY+'-'+pad(habM+1)+'-'+pad(d)])doneDays++;}}
      var pct=appDays>0?Math.round(doneDays/appDays*100):0;

      html+='<div style="font-size:10px;color:var(--text-muted)">'+getFreqLabel(h)+'</div></div>';
      html+='<div style="margin-left:auto;display:flex;gap:4px"><button class="ab" style="font-size:11px" data-edit-hab="'+h.id+'">&#9999;</button><button class="ab" style="font-size:11px;color:var(--danger)" data-del-hab="'+h.id+'">&times;</button></div>';
      html+='</div></td>';

        html+='</td>';

      html+='</tr>';

    html+='</tbody></table></div>';
  }

  document.getElementById('hab-prev').addEventListener('click',function(){habM--;if(habM<0){habM=11;habY--;}renderHab();});

  });});
}

function getFreqLabel(h){
  if(h.frequency==='daily')return'Every day';
  if(h.frequency==='weekdays')return'Mon-Fri';
  if(h.frequency==='weekends')return'Sat-Sun';
  if(h.frequency==='mwf')return'Mon, Wed, Fri';
  if(h.frequency==='tts')return'Tue, Thu, Sat';
  if(h.frequency==='custom'&&Array.isArray(h.custom_days)){return h.custom_days.map(function(d){return habDayNames[d];}).join(', ');}
  return h.frequency||'Daily';
}

    groceryItems[idx].checked=!groceryItems[idx].checked;

    document.body.appendChild(mo);
    var close=function(){if(mo.parentNode)mo.parentNode.removeChild(mo);};
    mo.querySelector('#egi-x').addEventListener('click',close);mo.querySelector('#egi-cancel').addEventListener('click',close);mo.addEventListener('click',function(e){if(e.target===mo)close();});
    mo.querySelector('#egi-save').addEventListener('click',function(){

}

function renderGrocMain(){
  var list=groceryLists.find(function(l){return l.id===activeGrocList;});
  var items=groceryItems.filter(function(i){return i.list_id===activeGrocList;});
  var unchecked=items.filter(function(i){return!i.checked;});
  var checked=items.filter(function(i){return i.checked;});
  var estTotal=items.reduce(function(s,i){return s+(+i.est_price||estGrocP(i.name,i.qty));},0);
  var actualTotal=items.reduce(function(s,i){return s+(+i.actual_price||0);},0);
  var spentTotal=checked.reduce(function(s,i){return s+(+i.actual_price||+i.est_price||estGrocP(i.name,i.qty));},0);

  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">';
  h+='<div style="font-size:16px;font-weight:800;color:var(--navy)">'+esc(list.name||'')+'</div>';
  h+='</div>';

  // Summary row
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  h+='<div style="background:var(--white);border-radius:10px;padding:10px 14px;border:1px solid var(--border);text-align:center"><div style="font-size:16px;font-weight:800;color:var(--navy)">'+items.length+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">Items</div></div>';
  h+='<div style="background:var(--white);border-radius:10px;padding:10px 14px;border:1px solid var(--border);text-align:center"><div style="font-size:15px;font-weight:800;color:var(--navy)">'+peso(estTotal)+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">Est. Total</div></div>';
  h+='<div style="background:var(--white);border-radius:10px;padding:10px 14px;border:1px solid var(--border);text-align:center"><div style="font-size:15px;font-weight:800;color:'+(actualTotal>0?'var(--success)':'var(--text-muted)')+'">'+( actualTotal>0?peso(actualTotal):'Not set')+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">Actual Total</div></div>';
  h+='</div>';

  if(checked.length>0){
    h+='<div style="background:#e8f5ee;border-radius:8px;padding:8px 14px;margin-bottom:14px;font-size:12px;color:var(--success);font-weight:600">Spent so far: '+peso(spentTotal)+' ('+checked.length+' items checked off)</div>';
  }

  // Add item form
  h+='<div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:16px">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px">Add Item</div>';
  h+='<div class="fr" style="margin-bottom:8px"><div class="fi" style="flex:2"><label>Item Name *</label><input id="gi-name" type="text" placeholder="e.g. Rice, Chicken, Shampoo"/></div><div class="fi"><label>Qty</label><input id="gi-qty" type="number" value="1" min="1" style="width:60px"/></div><div class="fi"><label>Unit</label><input id="gi-unit" type="text" placeholder="kg, pcs, L"/></div></div>';
  h+='<div class="fr" style="margin-bottom:10px"><div class="fi"><label>Est. Price (PHP)</label><input id="gi-est" type="number" step="0.01" placeholder="0.00"/></div><div class="fi"><label>Actual Price (PHP)</label><input id="gi-actual" type="number" step="0.01" placeholder="0.00"/></div></div>';
  h+='<div style="display:flex;justify-content:flex-end"><button class="btn" id="btn-add-item">Add Item</button></div></div>';

  // Items list
  if(!unchecked.length&&!checked.length){
    h+='<div style="text-align:center;padding:32px;color:var(--text-muted)">No items yet. Add your first item above.</div>';
    return h;
  }

  h+='<div class="card">';
  if(unchecked.length){
    h+='<div style="padding:8px 16px;background:var(--offwhite);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)">To Buy ('+unchecked.length+')</div>';
    unchecked.forEach(function(item){
      var est=+item.est_price||estGrocP(item.name,item.qty);var actual=+item.actual_price||0;
      h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)">';
      h+='<button data-gi-check="'+item.id+'" style="width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0"></button>';
      h+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc(item.name||'')+'</div><div style="font-size:11px;color:var(--text-muted)">'+(item.qty||1)+(item.unit?' '+item.unit:'')+' · Est: '+peso(est)+(actual?' · Actual: '+peso(actual):'')+'</div></div>';
      h+='<div style="display:flex;gap:4px"><button class="ab" data-gi-edit="'+item.id+'">&#9999;</button><button class="ab" style="color:var(--danger)" data-gi-del="'+item.id+'">&times;</button></div>';
      h+='</div>';
    });
  }
  if(checked.length){
    h+='<div style="padding:8px 16px;background:var(--offwhite);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)">Checked Off ('+checked.length+')</div>';
    checked.forEach(function(item){
      var actual=+item.actual_price||+item.est_price||estGrocP(item.name,item.qty);
      h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);opacity:.6">';
      h+='<button data-gi-check="'+item.id+'" style="width:20px;height:20px;border-radius:50%;border:2px solid var(--success);background:var(--success);cursor:pointer;flex-shrink:0;position:relative"><span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px">&#10003;</span></button>';
      h+='<div style="flex:1"><div style="font-size:13px;font-weight:600;text-decoration:line-through;color:var(--text-muted)">'+esc(item.name||'')+'</div><div style="font-size:11px;color:var(--text-muted)">'+(item.qty||1)+(item.unit?' '+item.unit:'')+' · '+peso(actual)+'</div></div>';
      h+='<button class="ab" style="color:var(--danger)" data-gi-del="'+item.id+'">&times;</button>';
      h+='</div>';
    });
  }
  return h+'</div>';
}

// -- BUCKETLIST --
var BL_CC={travel:'#4285f4',career:'#c9a84c',adventure:'#e05c5c',personal:'#4caf7d',relationships:'#e91e8c',creative:'#9c7de8',financial:'#f59e0b',health:'#00bcd4',other:'#7a8399'};
var BL_CL={travel:'✈️ Travel',career:'💼 Career',adventure:'🏔️ Adventure',personal:'🌱 Personal',relationships:'❤️ Relationships',creative:'🎨 Creative',financial:'💰 Financial',health:'💪 Health',other:'📌 Other'};
var BL_PR={high:'#e05c5c',medium:'#f59e0b',low:'#4caf7d'};
var blFilter='all',blSort='target_date';

function renderBL(){
  var c=document.getElementById('bl-inner');
  var filtered=blFilter==='all'?blItems:blFilter==='done'?blItems.filter(function(b){return b.completed;}):blItems.filter(function(b){return!b.completed&&b.category===blFilter;});
  var sorted=filtered.slice().sort(function(a,b){
    if(blSort==='target_date'){var da=a.target_date||'9999';var db2=b.target_date||'9999';return da.localeCompare(db2);}
    if(blSort==='priority'){var po={high:0,medium:1,low:2};return(po[a.priority]||1)-(po[b.priority]||1);}
    return(a.title||'').localeCompare(b.title||'');
  });
  var done=blItems.filter(function(b){return b.completed;}).length;
  var html='<div style="padding:18px 22px">';
  // Header
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">';
  html+='<div><h2 style="font-size:16px;font-weight:800;color:var(--navy)">🌟 Bucket List</h2><div style="font-size:12px;color:var(--text-muted);margin-top:2px">'+done+' of '+blItems.length+' completed</div></div>';
  html+='<button class="btn" id="btn-add-bl">＋ Add Item</button>';
  html+='</div>';
  // Progress bar
  if(blItems.length){var pct=Math.round(done/blItems.length*100);html+='<div class="pb" style="margin-bottom:16px;height:10px"><div class="pf" style="width:'+pct+'%;background:var(--gold)"></div></div>';}
  // Filters
  html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">';
  var allFilters=[['all','All'],['done','✅ Done']].concat(Object.keys(BL_CL).map(function(k){return[k,BL_CL[k]];}));
  allFilters.forEach(function(f){html+='<button style="padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid '+(blFilter===f[0]?'var(--navy)':'var(--border)')+';background:'+(blFilter===f[0]?'var(--navy)':'none')+';color:'+(blFilter===f[0]?'var(--gold)':'var(--text-muted)')+'" data-blf="'+f[0]+'">'+f[1]+'</button>';});
  html+='<select id="bl-sort" style="margin-left:auto;padding:4px 8px;border:1px solid var(--border);border-radius:7px;font-size:11px;font-family:inherit"><option value="target_date"'+(blSort==='target_date'?' selected':'')+'>Sort: Date</option><option value="priority"'+(blSort==='priority'?' selected':'')+'>Sort: Priority</option><option value="title"'+(blSort==='title'?' selected':'')+'>Sort: Title</option></select>';
  html+='</div>';
  // Table
  html+='<div class="card"><table class="tbl"><thead><tr><th></th><th>Item</th><th>Category</th><th>Priority</th><th>Target Date</th><th>Notes</th><th></th></tr></thead><tbody>';
  if(!sorted.length){html+='<tr class="er"><td colspan="7">No items yet. Click + Add Item to start your bucket list!</td></tr>';}
  sorted.forEach(function(b){
    var cc=BL_CC[b.category]||'#7a8399';var cl=BL_CL[b.category]||'Other';
    var pc=BL_PR[b.priority]||'#f59e0b';
    var du=b.target_date?daysUntil(b.target_date):null;
    var dateDisp=b.target_date?fmtDate(b.target_date):'--';
    var dateColor=du!==null?(du<0?'var(--danger)':du<=30?'var(--warn)':'var(--text-muted)'):'var(--text-muted)';
    html+='<tr style="'+(b.completed?'opacity:.5':'')+'"><td style="width:32px">';
    html+='<button data-bl-check="'+b.id+'" style="width:22px;height:22px;border-radius:50%;border:2px solid '+(b.completed?'var(--success)':'var(--border)')+';background:'+(b.completed?'var(--success)':'none')+';cursor:pointer;position:relative">';
    if(b.completed)html+='<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px">&#10003;</span>';
    html+='</button></td>';
    html+='<td><div style="font-size:13px;font-weight:600;'+(b.completed?'text-decoration:line-through':'')+'">'+esc(b.title||'')+'</div></td>';
    html+='<td><span class="bdg" style="background:'+cc+'22;color:'+cc+'">'+esc(cl)+'</span></td>';
    html+='<td><span class="bdg" style="background:'+pc+'22;color:'+pc+'">'+esc(b.priority||'medium')+'</span></td>';
    html+='<td style="font-size:12px;color:'+dateColor+';font-weight:600">'+dateDisp+(du!==null&&!b.completed?'<br><span style="font-size:10px">'+(du<0?'Overdue':du===0?'Today':'In '+du+'d')+'</span>':'')+'</td>';
    html+='<td style="font-size:12px;color:var(--text-muted);max-width:160px">'+esc(b.notes||'')+'</td>';
    html+='<td style="white-space:nowrap"><button class="ab" data-bl-edit="'+b.id+'">&#9999;</button><button class="ab" style="color:var(--danger)" data-bl-del="'+b.id+'">&times;</button></td>';
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';
  c.innerHTML=html;

  c.querySelectorAll('[data-blf]').forEach(function(b){b.addEventListener('click',function(){blFilter=b.dataset.blf;renderBL();});});
  var bs=c.querySelector('#bl-sort');if(bs)bs.addEventListener('change',function(){blSort=this.value;renderBL();});
  c.querySelector('#btn-add-bl').addEventListener('click',function(){openBLModal(null);});
  c.querySelectorAll('[data-bl-check]').forEach(function(b){b.addEventListener('click',function(){
    var idx=blItems.findIndex(function(x){return x.id===b.dataset.blCheck;});if(idx<0)return;
    blItems[idx].completed=!blItems[idx].completed;
    db('bucket_list?id=eq.'+b.dataset.blCheck,{method:'PATCH',body:JSON.stringify({completed:blItems[idx].completed})}).catch(function(){saveL();});
    renderBL();
  });});
  c.querySelectorAll('[data-bl-edit]').forEach(function(b){b.addEventListener('click',function(){openBLModal(b.dataset.blEdit);});});
  c.querySelectorAll('[data-bl-del]').forEach(function(b){b.addEventListener('click',function(){
    if(!confirm('Delete this item?'))return;
    blItems=blItems.filter(function(x){return x.id!==b.dataset.blDel;});
    db('bucket_list?id=eq.'+b.dataset.blDel,{method:'DELETE'}).catch(function(){saveL();});renderBL();
  });});
}

function openBLModal(editId){
  var item=editId?blItems.find(function(x){return x.id===editId;}):null;
  var mo=document.createElement('div');mo.className='mo show';
  var catOpts=Object.keys(BL_CL).map(function(k){return'<option value="'+k+'"'+((item&&item.category===k)||(!item&&k==='personal')?' selected':'')+'>'+BL_CL[k]+'</option>';}).join('');
  var body='<div class="fi"><label>Title *</label><input id="bli-title" value="'+esc(item?item.title||'':'')+'"/></div>';
  body+='<div class="fr"><div class="fi"><label>Category</label><select id="bli-cat">'+catOpts+'</select></div><div class="fi"><label>Priority</label><select id="bli-pri"><option value="high"'+(item&&item.priority==='high'?' selected':'')+'>High</option><option value="medium"'+(!item||item.priority==='medium'?' selected':'')+'>Medium</option><option value="low"'+(item&&item.priority==='low'?' selected':'')+'>Low</option></select></div></div>';
  body+='<div class="fi"><label>Target Date</label><input id="bli-date" type="date" value="'+esc(item?item.target_date||'':'')+'"/></div>';
  body+='<div class="fi"><label>Notes</label><textarea id="bli-notes" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;min-height:60px;resize:vertical">'+esc(item?item.notes||'':'')+'</textarea></div>';

  setTimeout(function(){var t=document.getElementById('bli-title');if(t)t.focus();},50);
  mo.querySelector('#blm-save').addEventListener('click',function(){
    var title=document.getElementById('bli-title').value.trim();if(!title){alert('Title required.');return;}

    if(editId){var idx=blItems.findIndex(function(x){return x.id===editId;});if(idx>=0)blItems[idx]=Object.assign(blItems[idx],data);db('bucket_list?id=eq.'+editId,{method:'PATCH',body:JSON.stringify(data)}).catch(function(){saveL();});}

    close();renderBL();
  });
}

// ── NOTES ──
var activeNote=null;
var notesEditingId=null;

function renderNotes(){
  var c=document.getElementById('notes-inner');
  var sorted=notes.slice().sort(function(a,b){return(b.updated_at||b.created_at||'').localeCompare(a.updated_at||a.created_at||'');});
  var current=activeNote?notes.find(function(n){return n.id===activeNote;}):null;
  if(!current&&sorted.length){current=sorted[0];activeNote=sorted[0].id;}

  var h='<div style="display:flex;height:calc(100vh - 56px);min-height:500px">';
  // Sidebar
  h+='<div style="width:220px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0">';
  h+='<div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px;font-weight:800;color:var(--navy)">Notes</span><button class="btn" style="font-size:11px;padding:4px 10px" id="btn-new-note">+ New</button></div>';
  h+='<div style="overflow-y:auto;flex:1">';
  if(!sorted.length){h+='<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">No notes yet</div>';}
  sorted.forEach(function(n){
    var preview=n.content?n.content.replace(/<[^>]+>/g,'').slice(0,60):'Empty note';
    h+='<div style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);border-left:3px solid '+(n.id===activeNote?'var(--gold)':'transparent')+';background:'+(n.id===activeNote?'var(--gold-pale)':'none')+'" data-note="'+n.id+'">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(n.title||'Untitled')+'</div>';
    h+='<div style="font-size:11px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(preview)+'</div>';
    h+='<div style="font-size:10px;color:var(--text-muted);margin-top:3px">'+fmtDate((n.updated_at||n.created_at||'').slice(0,10))+'</div>';
    h+='</div>';
  });
  h+='</div></div>';
  // Editor
  h+='<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">';
  if(!current){
    h+='<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted)"><div style="text-align:center"><div style="font-size:40px;margin-bottom:12px">📝</div><div>Select a note or create a new one</div></div></div>';
  } else {
    h+='<div style="background:var(--white);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px">';
    h+='<input id="note-title-edit" value="'+esc(current.title||'')+'\" style="flex:1;font-size:16px;font-weight:800;color:var(--navy);border:none;outline:none;font-family:inherit;background:none" placeholder="Note title..."/>';
    h+='<button class="ab" style="color:var(--danger)" id="btn-del-note">&#128465;</button>';
    h+='</div>';
    h+='<textarea id="note-content-edit" style="flex:1;padding:18px;border:none;outline:none;font-size:14px;font-family:inherit;resize:none;line-height:1.7;color:var(--text)" placeholder="Start writing...">'+esc(current.content||'')+'</textarea>';
    h+='<div style="padding:8px 18px;background:var(--white);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">';
    h+='<div style="font-size:11px;color:var(--text-muted)">Auto-saves as you type</div>';
    h+='<button class="btn" id="btn-save-note" style="font-size:12px;padding:6px 14px">Save</button>';
    h+='</div>';
  }
  h+='</div></div>';
  c.innerHTML=h;

  c.querySelectorAll('[data-note]').forEach(function(el){el.addEventListener('click',function(){activeNote=el.dataset.note;renderNotes();});});
  var nb=c.querySelector('#btn-new-note');
  if(nb)nb.addEventListener('click',function(){
    var nn={id:uid(),title:'New Note',content:'',created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
    notes.unshift(nn);activeNote=nn.id;
    db('notes',{method:'POST',body:JSON.stringify(nn)}).catch(function(){try{localStorage.setItem('nmb_notes',JSON.stringify(notes));}catch(e){}});
    renderNotes();setTimeout(function(){var t=document.getElementById('note-title-edit');if(t){t.focus();t.select();}},50);
  });
  var db2=c.querySelector('#btn-del-note');
  if(db2)db2.addEventListener('click',function(){
    if(!confirm('Delete this note?'))return;
    notes=notes.filter(function(n){return n.id!==activeNote;});
    db('notes?id=eq.'+activeNote,{method:'DELETE'}).catch(function(){});
    activeNote=notes.length?notes[0].id:null;renderNotes();
  });
  var saveNote=function(){
    if(!activeNote)return;
    var idx=notes.findIndex(function(n){return n.id===activeNote;});if(idx<0)return;
    var t=document.getElementById('note-title-edit');var ct=document.getElementById('note-content-edit');
    if(!t||!ct)return;
    notes[idx].title=t.value||'Untitled';notes[idx].content=ct.value;notes[idx].updated_at=new Date().toISOString();
    db('notes?id=eq.'+activeNote,{method:'PATCH',body:JSON.stringify({title:notes[idx].title,content:notes[idx].content,updated_at:notes[idx].updated_at})}).catch(function(){});
    // Update sidebar title live
    var sideItem=c.querySelector('[data-note="'+activeNote+'"] div:first-child');
    if(sideItem)sideItem.textContent=notes[idx].title||'Untitled';
  };
  var sns=c.querySelector('#btn-save-note');if(sns)sns.addEventListener('click',saveNote);
  var te=c.querySelector('#note-content-edit');var ti=c.querySelector('#note-title-edit');
  var autoSaveTimer=null;
  var autoSave=function(){clearTimeout(autoSaveTimer);autoSaveTimer=setTimeout(saveNote,1000);};
  if(te)te.addEventListener('input',autoSave);
  if(ti)ti.addEventListener('input',autoSave);
}

// ── SHOPPING LISTS ──
var activeShopList=null;
var shopFX='PHP';
try{var _asl=localStorage.getItem('nmb_asl');if(_asl)activeShopList=_asl;}catch(e){}

  html+='<div style="overflow-y:auto;flex:1">';
  shopLists.forEach(function(l){
    var ct=shopItems.filter(function(i){return i.list_id===l.id;}).length;

    html+='<div><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px">'+esc(l.name||'List')+'</div><div style="font-size:10px;color:var(--text-muted)">'+checked+'/'+ct+' checked</div></div>';
    html+='<div style="display:flex;gap:2px"><button class="ab" style="font-size:11px" data-edit-sl="'+l.id+'">&#9999;</button><button class="ab" style="font-size:11px;color:var(--danger)" data-del-sl="'+l.id+'">&times;</button></div>';
    html+='</div>';
  });
  html+='</div></div>';
  // Main
  html+='<div style="flex:1;overflow-y:auto;padding:18px 22px" id="shop-main">';
  if(!activeShopList||!shopLists.find(function(l){return l.id===activeShopList;})){
    html+='<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><div style="font-size:32px;margin-bottom:12px">🛍️</div><div style="font-size:14px">Select a list or create a new one</div></div>';
  } else {
    html+=renderShopMain();
  }
  html+='</div></div>';

  var nb=c.querySelector('#btn-new-slist');
  if(nb)nb.addEventListener('click',function(){
    var mo=document.createElement('div');mo.className='mo show';
    mo.innerHTML='<div class="md"><div class="mh"><h2>New Shopping List</h2><button class="mc" id="nsl-x">&times;</button></div><div class="fi"><label>List Name *</label><input id="nsl-name" placeholder="e.g. Back to school, Home appliances"/></div><div class="ma"><button class="bc" id="nsl-cancel">Cancel</button><button class="bs" id="nsl-save">Create</button></div></div>';
    document.body.appendChild(mo);
    var close=function(){if(mo.parentNode)mo.parentNode.removeChild(mo);};
    mo.querySelector('#nsl-x').addEventListener('click',close);mo.querySelector('#nsl-cancel').addEventListener('click',close);mo.addEventListener('click',function(e){if(e.target===mo)close();});
    mo.querySelector('#nsl-save').addEventListener('click',function(){
      var name=document.getElementById('nsl-name').value.trim();if(!name)return;
      var nl={id:uid(),name:name,created_at:new Date().toISOString()};
      shopLists.push(nl);activeShopList=nl.id;
      db('shop_lists',{method:'POST',body:JSON.stringify(nl)}).catch(function(){try{localStorage.setItem('nmb_slists',JSON.stringify(shopLists));}catch(e){}});
      close();renderShop();
    });
    setTimeout(function(){var inp=document.getElementById('nsl-name');if(inp)inp.focus();},50);
  });
  c.querySelectorAll('[data-edit-sl]').forEach(function(b){b.addEventListener('click',function(ev){ev.stopPropagation();
    var id=b.dataset.editSl;var list=shopLists.find(function(l){return l.id===id;});if(!list)return;
    var mo=document.createElement('div');mo.className='mo show';
    mo.innerHTML='<div class="md"><div class="mh"><h2>Rename List</h2><button class="mc" id="esl-x">&times;</button></div><div class="fi"><label>List Name</label><input id="esl-name" value="'+esc(list.name||'')+'"/></div><div class="ma"><button class="bc" id="esl-cancel">Cancel</button><button class="bs" id="esl-save">Save</button></div></div>';
    document.body.appendChild(mo);
    var close=function(){if(mo.parentNode)mo.parentNode.removeChild(mo);};
    mo.querySelector('#esl-x').addEventListener('click',close);mo.querySelector('#esl-cancel').addEventListener('click',close);mo.addEventListener('click',function(e){if(e.target===mo)close();});
    mo.querySelector('#esl-save').addEventListener('click',function(){
      var name=document.getElementById('esl-name').value.trim();if(!name)return;
      list.name=name;db('shop_lists?id=eq.'+id,{method:'PATCH',body:JSON.stringify({name:name})}).catch(function(){});close();renderShop();
    });
  });});
  c.querySelectorAll('[data-del-sl]').forEach(function(b){b.addEventListener('click',function(ev){ev.stopPropagation();
    if(!confirm('Delete this list and all its items?'))return;
    var id=b.dataset.delSl;
    shopLists=shopLists.filter(function(l){return l.id!==id;});
    shopItems=shopItems.filter(function(i){return i.list_id!==id;});
    if(activeShopList===id)activeShopList=shopLists.length?shopLists[0].id:null;
    db('shop_lists?id=eq.'+id,{method:'DELETE'}).catch(function(){});
    db('shop_items?list_id=eq.'+id,{method:'DELETE'}).catch(function(){});
    renderShop();
  });});
  bindShopMainEvents(c);
}

function renderShopMain(){
  var list=shopLists.find(function(l){return l.id===activeShopList;});
  var items=shopItems.filter(function(i){return i.list_id===activeShopList;});
  var unchecked=items.filter(function(i){return!i.checked;});
  var checked=items.filter(function(i){return i.checked;});
  var phpTotal=items.reduce(function(s,i){return s+(i.currency==='USD'?(+i.price||0)*57:(+i.price||0));},0);
  var spentPhp=checked.reduce(function(s,i){return s+(i.currency==='USD'?(+i.price||0)*57:(+i.price||0));},0);

  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">';
  h+='<div style="font-size:16px;font-weight:800;color:var(--navy)">'+esc(list.name||'')+'</div>';
  h+='<div style="display:flex;background:var(--offwhite);border:1px solid var(--border);border-radius:8px;overflow:hidden"><button style="padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:'+(shopFX==='PHP'?'var(--navy)':'none')+';color:'+(shopFX==='PHP'?'var(--gold)':'var(--text-muted)')+'" id="shop-php">PHP</button><button style="padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:'+(shopFX==='USD'?'var(--navy)':'none')+';color:'+(shopFX==='USD'?'var(--gold)':'var(--text-muted)')+'" id="shop-usd">USD</button></div>';
  h+='</div>';

  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  h+='<div style="background:var(--white);border-radius:10px;padding:10px 14px;border:1px solid var(--border);text-align:center"><div style="font-size:16px;font-weight:800;color:var(--navy)">'+items.length+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">Items</div></div>';
  h+='<div style="background:var(--white);border-radius:10px;padding:10px 14px;border:1px solid var(--border);text-align:center"><div style="font-size:15px;font-weight:800;color:var(--navy)">'+(shopFX==='PHP'?peso(phpTotal):'$'+(phpTotal/57).toFixed(2))+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">Total</div></div>';
  h+='<div style="background:var(--white);border-radius:10px;padding:10px 14px;border:1px solid var(--border);text-align:center"><div style="font-size:15px;font-weight:800;color:var(--success)">'+(shopFX==='PHP'?peso(spentPhp):'$'+(spentPhp/57).toFixed(2))+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">Spent (checked)</div></div>';
  h+='</div>';

  // Add item form
  h+='<div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:16px">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px">Add Item</div>';
  h+='<div class="fr" style="margin-bottom:8px"><div class="fi" style="flex:2"><label>Item Name *</label><input id="si-name" type="text" placeholder="e.g. Nike Air Force 1"/></div><div class="fi"><label>Brand</label><input id="si-brand" type="text" placeholder="e.g. Nike"/></div></div>';
  h+='<div class="fi" style="margin-bottom:8px"><label>Link (URL)</label><input id="si-link" type="url" placeholder="https://..."/></div>';
  h+='<div class="fr" style="margin-bottom:10px"><div class="fi"><label>Price</label><input id="si-price" type="number" step="0.01" placeholder="0.00"/></div><div class="fi"><label>Currency</label><select id="si-cur"><option value="PHP">PHP ₱</option><option value="USD">USD $</option></select></div></div>';
  h+='<div style="display:flex;justify-content:flex-end"><button class="btn" id="btn-add-si">Add Item</button></div></div>';

  // Items
  h+='<div class="card">';
  if(!unchecked.length&&!checked.length){h+='<div style="text-align:center;padding:32px;color:var(--text-muted)">No items yet.</div>';return h+'</div>';}
  if(unchecked.length){
    h+='<div style="padding:8px 16px;background:var(--offwhite);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)">Want to Buy ('+unchecked.length+')</div>';
    unchecked.forEach(function(item){
      var priceDisp=item.currency==='USD'?'$'+(+item.price||0).toFixed(2):peso(+item.price||0);
      h+='<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)">';
      h+='<button data-si-check="'+item.id+'" style="width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;margin-top:1px"></button>';
      h+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc(item.name||'')+'</div>';
      if(item.brand)h+='<div style="font-size:11px;color:var(--text-muted)">'+esc(item.brand)+'</div>';
      if(item.link)h+='<a href="'+esc(item.link)+'" target="_blank" style="font-size:11px;color:#4a6bc4;text-decoration:none">&#x1F517; View item</a>';
      h+='<div style="font-size:13px;font-weight:700;color:var(--navy);margin-top:3px">'+priceDisp+'</div></div>';
      h+='<div style="display:flex;gap:4px;flex-shrink:0"><button class="ab" data-si-edit="'+item.id+'">&#9999;</button><button class="ab" style="color:var(--danger)" data-si-del="'+item.id+'">&times;</button></div>';
      h+='</div>';
    });
  }
  if(checked.length){
    h+='<div style="padding:8px 16px;background:var(--offwhite);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)">Bought ('+checked.length+')</div>';
    checked.forEach(function(item){
      var priceDisp=item.currency==='USD'?'$'+(+item.price||0).toFixed(2):peso(+item.price||0);
      h+='<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);opacity:.6">';
      h+='<button data-si-check="'+item.id+'" style="width:22px;height:22px;border-radius:50%;border:2px solid var(--success);background:var(--success);cursor:pointer;flex-shrink:0;position:relative"><span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px">&#10003;</span></button>';
      h+='<div style="flex:1"><div style="font-size:13px;font-weight:600;text-decoration:line-through">'+esc(item.name||'')+'</div>';
      if(item.brand)h+='<div style="font-size:11px;color:var(--text-muted)">'+esc(item.brand)+'</div>';
      h+='<div style="font-size:12px;font-weight:700;color:var(--navy)">'+priceDisp+'</div></div>';

      h+='</div>';
    });
  }
  return h+'</div>';
}

function bindShopMainEvents(c){
  var fxPhp=c.querySelector('#shop-php');var fxUsd=c.querySelector('#shop-usd');
  if(fxPhp)fxPhp.addEventListener('click',function(){shopFX='PHP';var m=c.querySelector('#shop-main');if(m)m.innerHTML=renderShopMain();bindShopMainEvents(c);});
  if(fxUsd)fxUsd.addEventListener('click',function(){shopFX='USD';var m=c.querySelector('#shop-main');if(m)m.innerHTML=renderShopMain();bindShopMainEvents(c);});
  var addBtn=c.querySelector('#btn-add-si');
  if(addBtn)addBtn.addEventListener('click',function(){
    var name=document.getElementById('si-name').value.trim();if(!name)return;
    var ni={id:uid(),list_id:activeShopList,name:name,brand:document.getElementById('si-brand').value.trim(),link:document.getElementById('si-link').value.trim(),price:+document.getElementById('si-price').value||0,currency:document.getElementById('si-cur').value,checked:false,created_at:new Date().toISOString()};
    shopItems.push(ni);db('shop_items',{method:'POST',body:JSON.stringify(ni)}).catch(function(){try{localStorage.setItem('nmb_sitems',JSON.stringify(shopItems));}catch(e){}});
    document.getElementById('si-name').value='';document.getElementById('si-brand').value='';document.getElementById('si-link').value='';document.getElementById('si-price').value='';
    document.getElementById('si-name').focus();
    var m=c.querySelector('#shop-main');if(m)m.innerHTML=renderShopMain();bindShopMainEvents(c);
  });
  c.querySelectorAll('[data-si-check]').forEach(function(b){b.addEventListener('click',function(){
    var id=b.dataset.siCheck;var idx=shopItems.findIndex(function(x){return x.id===id;});if(idx<0)return;
    shopItems[idx].checked=!shopItems[idx].checked;
    db('shop_items?id=eq.'+id,{method:'PATCH',body:JSON.stringify({checked:shopItems[idx].checked})}).catch(function(){});
    var m=c.querySelector('#shop-main');if(m)m.innerHTML=renderShopMain();bindShopMainEvents(c);
  });});
