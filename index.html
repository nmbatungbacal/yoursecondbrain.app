    var id=b.dataset.siDel;shopItems=shopItems.filter(function(x){return x.id!==id;});
    db('shop_items?id=eq.'+id,{method:'DELETE'}).catch(function(){});
    var m=c.querySelector('#shop-main');if(m)m.innerHTML=renderShopMain();bindShopMainEvents(c);
  });});

}

function daysUntil(ds){if(!ds)return 999;var d=new Date(ds);d.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/864e5);}
function fsc(label,val,type,sub){var color=type==='i'?'var(--success)':type==='e'?'var(--danger)':'var(--navy)';return'<div class="sc"><div class="l">'+label+'</div><div class="v" style="color:'+color+'">'+val+'</div>'+(sub?'<div class="s">'+sub+'</div>':'')+'</div>';}

  html+='</div>';

  html+='<button style="background:none;border:1px solid var(--border);border-radius:5px;width:28px;height:28px;cursor:pointer;font-size:14px" id="fin-prev">&#8249;</button>';
  html+='<div style="font-size:12px;font-weight:700;color:var(--navy);min-width:80px;text-align:center">'+MONTHS_S[finM]+' '+finY+'</div>';
  html+='<button style="background:none;border:1px solid var(--border);border-radius:5px;width:28px;height:28px;cursor:pointer;font-size:14px" id="fin-next">&#8250;</button>';
  html+='</div></div>';
  html+='<div style="padding:20px 22px" id="fin-body">'+renderFinTab(ms)+'</div>';
  c.innerHTML=html;
  c.querySelectorAll('[data-ft]').forEach(function(b){b.addEventListener('click',function(){finTab=b.dataset.ft;renderFin();});});
  document.getElementById('fin-prev').addEventListener('click',function(){finM--;if(finM<0){finM=11;finY--;}renderFin();});
  document.getElementById('fin-next').addEventListener('click',function(){finM++;if(finM>11){finM=0;finY++;}renderFin();});
  bindFinEvents(c,ms);
}

      });
      h+='</tbody></table></div>';
    }
    if(paid.length){

      h+='<div class="card"><table class="tbl"><thead><tr><th>Name</th><th>Amount</th><th>Due Date</th><th></th></tr></thead><tbody>';
      paid.forEach(function(d){h+='<tr style="opacity:.6"><td>'+esc(d.name||'')+'</td><td>'+peso(d.amount)+'</td><td>'+fmtDate(d.due_date)+'</td><td><button class="btn-g" style="font-size:10px;padding:3px 7px" data-unpay-dl="'+d.id+'">Unpay</button> <button class="ab" style="color:var(--danger)" data-dfin="dl" data-did="'+d.id+'">&times;</button></td></tr>';});
      h+='</tbody></table></div>';
    }

  }

  if(finTab==='debts'){
    var h='<div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px;margin-bottom:20px">';
    h+='<div style="font-size:13px;font-weight:800;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)">&#10010; Add Debt</div>';
    h+='<div class="fr" style="margin-bottom:12px"><div class="fi"><label>Debt Name *</label><input id="nd-name" type="text" placeholder="e.g. BPI Credit Card, SSS Loan"/></div><div class="fi"><label>Total Amount (PHP)</label><input id="nd-total" type="number" step="0.01" placeholder="0.00"/></div></div>';
    h+='<div class="fr" style="margin-bottom:12px"><div class="fi"><label>Remaining Balance (PHP)</label><input id="nd-remain" type="number" step="0.01" placeholder="0.00"/></div><div class="fi"><label>Monthly Payment (PHP)</label><input id="nd-mpay" type="number" step="0.01" placeholder="0.00"/></div></div>';
    h+='<div class="fi" style="margin-bottom:16px"><label>Notes</label><input id="nd-notes" type="text" placeholder="e.g. 24% interest, ends Dec 2026"/></div>';
    h+='<div style="display:flex;justify-content:flex-end"><button class="btn" id="btn-add-debt">Save Debt</button></div></div>';
    var activeDebts=finDebts.filter(function(d){return!d.cleared;});
    var clearedDebts=finDebts.filter(function(d){return d.cleared;});
    var totDebt=activeDebts.reduce(function(s,d){return s+(+d.remaining_balance||0);},0);
    h+='<div class="sg" style="margin-bottom:18px">'+fsc('Total Outstanding',peso(totDebt),'e','Active debts')+fsc('Active Debts',activeDebts.length+'','','Items')+'</div>';

    if(activeDebts.length){
      h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:18px">';
      activeDebts.forEach(function(d){var pct=d.total_amount>0?Math.min(100,Math.round((d.total_amount-(+d.remaining_balance||0))/d.total_amount*100)):0;
        h+='<div class="card" style="padding:16px"><div style="font-size:14px;font-weight:800;color:var(--navy);margin-bottom:6px">'+esc(d.name||'')+'</div>';
        h+='<div style="font-size:22px;font-weight:900;color:var(--danger)">'+peso(+d.remaining_balance||0)+'</div>';
        h+='<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">remaining of '+peso(d.total_amount)+' &bull; Monthly: '+peso(d.monthly_payment)+'</div>';
        h+='<div class="pb" style="margin-bottom:8px"><div class="pf" style="width:'+pct+'%;background:var(--success)"></div></div>';
        h+='<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">'+pct+'% paid off</div>';
        if(d.notes)h+='<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">'+esc(d.notes)+'</div>';
        h+='<div style="display:flex;gap:6px;margin-bottom:8px"><div class="fi" style="flex:1;margin:0"><input type="number" id="pay-debt-'+d.id+'" step="0.01" placeholder="Payment amount" style="font-size:12px;padding:6px 9px"/></div><button class="btn" style="font-size:11px;padding:6px 10px;white-space:nowrap" data-log-pay="'+d.id+'">Log Payment</button></div>';
        h+='<div style="display:flex;justify-content:flex-end;gap:5px"><button class="btn-g" style="font-size:11px;padding:4px 8px" data-clear-debt="'+d.id+'">Mark Cleared</button><button class="ab" data-efin="debt" data-eid="'+d.id+'">&#9999;</button><button class="ab" style="color:var(--danger)" data-dfin="debt" data-did="'+d.id+'">&times;</button></div></div>';
      });
      h+='</div>';
    }
    if(clearedDebts.length){
      h+='<div style="font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:10px">Cleared ('+clearedDebts.length+')</div>';
      h+='<div class="card"><table class="tbl"><thead><tr><th>Name</th><th>Total</th><th>Notes</th><th></th></tr></thead><tbody>';
      clearedDebts.forEach(function(d){h+='<tr style="opacity:.6"><td>'+esc(d.name||'')+'</td><td>'+peso(d.total_amount)+'</td><td style="font-size:12px">'+esc(d.notes||'')+'</td><td><button class="ab" style="color:var(--danger)" data-dfin="debt" data-did="'+d.id+'">&times;</button></td></tr>';});
      h+='</tbody></table></div>';
    }
    return h;
  }

  if(finTab==='networth'){
    var h='<div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px;margin-bottom:20px">';
    h+='<div style="font-size:13px;font-weight:800;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)">&#10010; Add Asset or Liability</div>';
    h+='<div class="fr" style="margin-bottom:12px"><div class="fi"><label>Name *</label><input id="nnw-name" type="text" placeholder="e.g. BDO Savings, Car, Laptop"/></div><div class="fi"><label>Type</label><select id="nnw-type"><option value="asset">Asset</option><option value="liability">Liability</option></select></div></div>';
    h+='<div class="fr" style="margin-bottom:12px"><div class="fi"><label>Value (PHP) *</label><input id="nnw-val" type="number" step="0.01" placeholder="0.00"/></div><div class="fi"><label>Category</label><select id="nnw-cat"><option value="cash">Cash / Savings</option><option value="investment">Investment</option><option value="property">Property</option><option value="vehicle">Vehicle</option><option value="equipment">Equipment / Gadgets</option><option value="loan">Loan</option><option value="credit">Credit Card</option><option value="other">Other</option></select></div></div>';
    h+='<div style="display:flex;justify-content:flex-end"><button class="btn" id="btn-add-nw">Save Item</button></div></div>';
    var assets=finNW.filter(function(n){return n.type==='asset';});
    var liabs=finNW.filter(function(n){return n.type==='liability';});
    var totA=assets.reduce(function(s,n){return s+(+n.value||0);},0);
    var totL=liabs.reduce(function(s,n){return s+(+n.value||0);},0);
    h+='<div class="sg" style="margin-bottom:18px">'+fsc('Total Assets',peso(totA),'i','')+fsc('Total Liabilities',peso(totL),'e','')+fsc('Net Worth',peso(totA-totL),totA-totL>=0?'i':'e','')+'</div>';
    if(!finNW.length){h+='<div class="card"><div style="text-align:center;padding:32px;color:var(--text-muted)">No items added yet.</div></div>';return h;}
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
    h+='<div class="card"><div class="ch"><h3>&#x1F4C8; Assets</h3></div><div>';
    if(!assets.length)h+='<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">None added.</div>';
    assets.forEach(function(n){h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:600">'+esc(n.name||'')+'</div><div style="font-size:10px;color:var(--text-muted)">'+esc(n.category||'')+'</div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;color:var(--success)">'+peso(n.value)+'</span><button class="ab" style="color:var(--danger)" data-dfin="nw" data-did="'+n.id+'">&times;</button></div></div>';});
    h+='</div></div>';
    h+='<div class="card"><div class="ch"><h3>&#x1F4C9; Liabilities</h3></div><div>';
    if(!liabs.length)h+='<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">None added.</div>';
    liabs.forEach(function(n){h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:600">'+esc(n.name||'')+'</div><div style="font-size:10px;color:var(--text-muted)">'+esc(n.category||'')+'</div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;color:var(--danger)">'+peso(n.value)+'</span><button class="ab" style="color:var(--danger)" data-dfin="nw" data-did="'+n.id+'">&times;</button></div></div>';});
    return h+'</div></div></div>';
  }

  if(finTab==='accounts'){
    var h='<div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px;margin-bottom:20px">';
    h+='<div style="font-size:13px;font-weight:800;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)">&#10010; Add Account</div>';
    h+='<div class="fr" style="margin-bottom:12px"><div class="fi"><label>Account Name *</label><input id="na-name" type="text" placeholder="e.g. BDO Savings, GCash, BPI Credit"/></div><div class="fi"><label>Type</label><select id="na-type"><option value="bank">Bank Account</option><option value="ewallet">E-Wallet</option><option value="cash">Cash on Hand</option><option value="credit">Credit Card</option><option value="investment">Investment</option><option value="other">Other</option></select></div></div>';
    h+='<div class="fi" style="margin-bottom:16px"><label>Current Balance (PHP)</label><input id="na-bal" type="number" step="0.01" placeholder="0.00"/></div>';
    h+='<div style="display:flex;justify-content:flex-end"><button class="btn" id="btn-add-acc">Save Account</button></div></div>';
    var totBal=finAccounts.reduce(function(s,a){return s+(+a.balance||0);},0);
    h+='<div class="sg" style="margin-bottom:18px">'+fsc('Total Balance',peso(totBal),'i','All accounts')+fsc('Accounts',finAccounts.length+'','','Active')+'</div>';
    if(!finAccounts.length){h+='<div class="card"><div style="text-align:center;padding:32px;color:var(--text-muted)">No accounts added yet.</div></div>';return h;}
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">';
    var icons={bank:'&#x1F3E6;',ewallet:'&#x1F4F1;',cash:'&#x1F4B5;',credit:'&#x1F4B3;',investment:'&#x1F4C8;',other:'&#x1F4CC;'};
    finAccounts.forEach(function(a){h+='<div class="card"><div class="ch"><h3>'+(icons[a.type]||'&#x1F3E6;')+' '+esc(a.name||'')+'</h3><div style="display:flex;gap:4px"><button class="ab" data-efin="acc" data-eid="'+a.id+'">&#9999;</button><button class="ab" style="color:var(--danger)" data-dfin="acc" data-did="'+a.id+'">&times;</button></div></div><div style="padding:12px 16px"><div style="font-size:22px;font-weight:900;color:'+(+a.balance<0?'var(--danger)':'var(--navy)')+'">'+peso(+a.balance||0)+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:3px;text-transform:capitalize">'+esc(a.type||'')+'</div></div></div>';});
    return h+'</div>';
  }
  return '';
}

function bindFinEvents(c,ms){
  var bI=c.querySelector('#btn-add-inc');
  if(bI)bI.addEventListener('click',function(){
    var src=document.getElementById('ni-src').value.trim();var amt=document.getElementById('ni-amt').value;
    if(!src||!amt){alert('Source and amount are required.');return;}
    var ni={id:uid(),created_at:new Date().toISOString(),source:src,amount:+amt,date:document.getElementById('ni-date').value||todayStr(),category:document.getElementById('ni-cat').value,notes:document.getElementById('ni-notes').value.trim()};
    finIncome.unshift(ni);db('fin_income',{method:'POST',body:JSON.stringify(ni)}).catch(function(){});renderFin();renderDash();
  });
  var bE=c.querySelector('#btn-add-exp');
  if(bE)bE.addEventListener('click',function(){
    var desc=document.getElementById('ne-desc').value.trim();var amt=document.getElementById('ne-amt').value;
    if(!desc||!amt){alert('Description and amount are required.');return;}
    var ne={id:uid(),created_at:new Date().toISOString(),description:desc,amount:+amt,date:document.getElementById('ne-date').value||todayStr(),category:document.getElementById('ne-cat').value,notes:document.getElementById('ne-notes').value.trim()};
    finExpenses.unshift(ne);db('fin_expenses',{method:'POST',body:JSON.stringify(ne)}).catch(function(){});renderFin();renderDash();
  });
  var bB=c.querySelector('#btn-add-bud');
  if(bB)bB.addEventListener('click',function(){
    var amt=document.getElementById('nb-amt').value;if(!amt){alert('Amount required.');return;}
    var nb={id:uid(),created_at:new Date().toISOString(),category:document.getElementById('nb-cat').value,amount:+amt};
    finBudgets.push(nb);db('fin_budgets',{method:'POST',body:JSON.stringify(nb)}).catch(function(){});renderFin();
  });
  var bS=c.querySelector('#btn-add-sav');
  if(bS)bS.addEventListener('click',function(){
    var name=document.getElementById('ns-name').value.trim();var target=document.getElementById('ns-target').value;
    if(!name||!target){alert('Name and target amount required.');return;}
    var ns={id:uid(),created_at:new Date().toISOString(),name:name,target_amount:+target,current_amount:+document.getElementById('ns-curr').value||0,target_date:document.getElementById('ns-date').value||null};
    finSavings.push(ns);db('fin_savings',{method:'POST',body:JSON.stringify(ns)}).catch(function(){});renderFin();
  });
  c.querySelectorAll('[data-upd-sav]').forEach(function(b){b.addEventListener('click',function(){
    var id=b.dataset.updSav;var inp=document.getElementById('upd-sav-'+id);if(!inp||!inp.value)return;
    var idx=finSavings.findIndex(function(x){return x.id===id;});if(idx<0)return;
    finSavings[idx].current_amount=+inp.value;
    db('fin_savings?id=eq.'+id,{method:'PATCH',body:JSON.stringify({current_amount:+inp.value})}).catch(function(){});renderFin();
  });});
  var bDL=c.querySelector('#btn-add-dl');
  if(bDL)bDL.addEventListener('click',function(){
    var name=document.getElementById('ndl-name').value.trim();if(!name){alert('Name required.');return;}
    var ndl={id:uid(),created_at:new Date().toISOString(),name:name,amount:+document.getElementById('ndl-amt').value||0,due_date:document.getElementById('ndl-date').value||null,recurrence:document.getElementById('ndl-rec').value,paid:false,notes:document.getElementById('ndl-notes').value.trim()};
    finDeadlines.push(ndl);db('fin_deadlines',{method:'POST',body:JSON.stringify(ndl)}).catch(function(){});renderFin();
  });
  c.querySelectorAll('[data-pay-dl]').forEach(function(b){b.addEventListener('click',function(){
    var idx=finDeadlines.findIndex(function(x){return x.id===b.dataset.payDl;});if(idx<0)return;
    finDeadlines[idx].paid=true;db('fin_deadlines?id=eq.'+b.dataset.payDl,{method:'PATCH',body:JSON.stringify({paid:true})}).catch(function(){});renderFin();
  });});
  c.querySelectorAll('[data-unpay-dl]').forEach(function(b){b.addEventListener('click',function(){
    var idx=finDeadlines.findIndex(function(x){return x.id===b.dataset.unpayDl;});if(idx<0)return;
    finDeadlines[idx].paid=false;db('fin_deadlines?id=eq.'+b.dataset.unpayDl,{method:'PATCH',body:JSON.stringify({paid:false})}).catch(function(){});renderFin();
  });});
  var bD=c.querySelector('#btn-add-debt');
  if(bD)bD.addEventListener('click',function(){
    var name=document.getElementById('nd-name').value.trim();if(!name){alert('Name required.');return;}
    var nd={id:uid(),created_at:new Date().toISOString(),name:name,total_amount:+document.getElementById('nd-total').value||0,remaining_balance:+document.getElementById('nd-remain').value||0,monthly_payment:+document.getElementById('nd-mpay').value||0,cleared:false,notes:document.getElementById('nd-notes').value.trim()};
    finDebts.push(nd);db('fin_debts',{method:'POST',body:JSON.stringify(nd)}).catch(function(){});renderFin();
  });
  c.querySelectorAll('[data-log-pay]').forEach(function(b){b.addEventListener('click',function(){
    var id=b.dataset.logPay;var inp=document.getElementById('pay-debt-'+id);if(!inp||!inp.value)return;
    var idx=finDebts.findIndex(function(x){return x.id===id;});if(idx<0)return;
    var newBal=Math.max(0,(+finDebts[idx].remaining_balance||0)-(+inp.value));
    finDebts[idx].remaining_balance=newBal;
    db('fin_debts?id=eq.'+id,{method:'PATCH',body:JSON.stringify({remaining_balance:newBal})}).catch(function(){});renderFin();
  });});
  c.querySelectorAll('[data-clear-debt]').forEach(function(b){b.addEventListener('click',function(){
    var idx=finDebts.findIndex(function(x){return x.id===b.dataset.clearDebt;});if(idx<0)return;
    finDebts[idx].cleared=true;finDebts[idx].remaining_balance=0;
    db('fin_debts?id=eq.'+b.dataset.clearDebt,{method:'PATCH',body:JSON.stringify({cleared:true,remaining_balance:0})}).catch(function(){});renderFin();
  });});
  var bNW=c.querySelector('#btn-add-nw');
  if(bNW)bNW.addEventListener('click',function(){
    var name=document.getElementById('nnw-name').value.trim();var val=document.getElementById('nnw-val').value;
    if(!name||!val){alert('Name and value required.');return;}
    var nnw={id:uid(),created_at:new Date().toISOString(),name:name,type:document.getElementById('nnw-type').value,value:+val,category:document.getElementById('nnw-cat').value};
    finNW.push(nnw);db('fin_networth',{method:'POST',body:JSON.stringify(nnw)}).catch(function(){});renderFin();
  });
  var bA=c.querySelector('#btn-add-acc');
  if(bA)bA.addEventListener('click',function(){
    var name=document.getElementById('na-name').value.trim();if(!name){alert('Name required.');return;}
    var na={id:uid(),created_at:new Date().toISOString(),name:name,type:document.getElementById('na-type').value,balance:+document.getElementById('na-bal').value||0};
    finAccounts.push(na);db('fin_accounts',{method:'POST',body:JSON.stringify(na)}).catch(function(){});renderFin();
  });
  c.querySelectorAll('[data-dfin]').forEach(function(b){b.addEventListener('click',function(){
    if(!confirm('Delete this item?'))return;
    var id=b.dataset.did;var type=b.dataset.dfin;
    var mapD={inc:finIncome,exp:finExpenses,bud:finBudgets,sav:finSavings,dl:finDeadlines,debt:finDebts,nw:finNW,acc:finAccounts};
    var tblD={inc:'fin_income',exp:'fin_expenses',bud:'fin_budgets',sav:'fin_savings',dl:'fin_deadlines',debt:'fin_debts',nw:'fin_networth',acc:'fin_accounts'};
    if(!mapD[type])return;
    var idx=mapD[type].findIndex(function(x){return x.id===id;});if(idx>=0)mapD[type].splice(idx,1);
    if(tblD[type])db(tblD[type]+'?id=eq.'+id,{method:'DELETE'}).catch(function(){});
    renderFin();renderDash();
  });});
  c.querySelectorAll('[data-efin]').forEach(function(b){b.addEventListener('click',function(){openFinEdit(b.dataset.efin,b.dataset.eid);});});
}

function openFinEdit(type,id){
  var mapE={inc:finIncome,exp:finExpenses,bud:finBudgets,sav:finSavings,dl:finDeadlines,debt:finDebts,nw:finNW,acc:finAccounts};
  var arr=mapE[type];if(!arr)return;
  var item=arr.find(function(x){return x.id===id;});if(!item)return;
  var mo=document.createElement('div');mo.className='mo show';

// -- ATTENDANCE --
var attSchedJobId=null;

function attDR(j){if(+j.daily_rate)return +j.daily_rate;var s=+j.basic_salary||0;if(j.salary_type==='monthly')return s/22;if(j.salary_type==='semi-monthly')return(s*2)/22;if(j.salary_type==='daily')return s;if(j.salary_type==='hourly')return s*8;return s/22;}
function attActiveSched(j){var sc=j.schedules||[];if(!sc.length)return{time_in:j.time_in||'',time_out:j.time_out||''};return sc.slice().sort(function(a,b){return b.from.localeCompare(a.from);})[0];}
function attCutoffLbl(j,p){var s2=p===1?j.c1_start:j.c2_start;var e2=p===1?j.c1_end:j.c2_end;var pay=p===1?j.c1_pay:j.c2_pay;if(!s2&&!e2)return'Not set';var out=[];if(s2&&e2)out.push('Day '+s2+'-'+e2);else if(s2)out.push('Day '+s2);if(pay)out.push('Pay day '+pay);return out.join(' | ');}
function fmtTime2(t){if(!t)return'--';try{var p=t.split(':');var h=+p[0],m=p[1],ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ap;}catch(e){return t;}}
function compPay(j,jL){
  var dr=attDR(j),otr=dr/8*1.25;
  var pres=jL.filter(function(l){return l.status==='present'||l.status==='wfh';}).length;
  var half=jL.filter(function(l){return l.status==='halfday';}).length;
  var ot=jL.reduce(function(s,l){return s+(+l.ot_hours||0);},0);
  var late=jL.reduce(function(s,l){return s+(+l.late_minutes||0);},0);
  var hol=jL.filter(function(l){return l.status==='holiday_worked';});
  var holPay=hol.reduce(function(s,l){return s+(dr*2*((+l.ot_hours||8)/8));},0);
  var splHol=jL.filter(function(l){return l.status==='special_holiday_worked';});
  var splHolPay=splHol.reduce(function(s,l){return s+(dr*1.3*((+l.ot_hours||8)/8));},0);
  var gross=(pres*dr)+(half*dr*.5)+(ot*otr)+holPay+splHolPay;
  var ld=(late/60)*dr;
  var sal=+j.basic_salary||0;if(j.salary_type==='semi-monthly')sal*=2;else if(j.salary_type==='daily')sal=dr*22;
  var sss=j.ded_sss!=null?+j.ded_sss:Math.min(sal*.045,900);
  var ph=j.ded_ph!=null?+j.ded_ph:Math.min(sal*.025,500);
  var pib=j.ded_pi!=null?+j.ded_pi:100;
  var wtax=+j.ded_wtax||0;
  return{gross:gross,late:ld,sss:sss,ph:ph,pib:pib,wtax:wtax,net:gross-ld-sss-ph-pib-wtax,pres:pres,half:half,abs:jL.filter(function(l){return l.status==='absent';}).length,ot:ot,dr:dr,holPay:holPay,splHolPay:splHolPay};
}

    });
    h+='</div><div style="background:var(--navy);border-radius:var(--radius);padding:16px 22px;margin-top:16px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;font-weight:700;color:var(--gold-pale)">Total Estimated Net</div><div style="font-size:24px;font-weight:900;color:var(--gold)">'+peso(gNet)+'</div></div>';
    h+='<div style="margin-top:10px;font-size:11px;color:var(--text-muted);line-height:1.6">PH Holiday Pay: Regular Holiday worked = 200% daily rate. Special Holiday worked = 130%. Estimates only - verify with actual payslip.</div>';
    return h;
  }
  return '';
}

  c.querySelectorAll('[data-att-del-job]').forEach(function(b){b.addEventListener('click',function(){if(!confirm('Delete this job?'))return;var id=b.dataset.attDelJob;attJobs=attJobs.filter(function(j){return j.id!==id;});attLogs=attLogs.filter(function(l){return l.job_id!==id;});db('att_jobs?id=eq.'+id,{method:'DELETE'}).catch(function(){});db('att_logs?job_id=eq.'+id,{method:'DELETE'}).catch(function(){});renderAtt();renderDash();});});

function openAttEditLog(id){
  var l=attLogs.find(function(x){return x.id===id;});if(!l)return;
  var jobOpts2=attJobs.map(function(j){return'<option value="'+j.id+'"'+(j.id===l.job_id?' selected':'')+'>'+esc(j.name)+'</option>';}).join('');
  var mo=document.createElement('div');mo.className='mo show';
  var body='<div class="fr"><div class="fi"><label>Job</label><select id="el-job">'+jobOpts2+'</select></div><div class="fi"><label>Date</label><input id="el-date" type="date" value="'+esc(l.log_date||'')+'"/></div></div>';
  body+='<div class="fi"><label>Status</label><select id="el-status"><option value="present"'+(l.status==='present'?' selected':'')+'>Present</option><option value="absent"'+(l.status==='absent'?' selected':'')+'>Absent</option><option value="halfday"'+(l.status==='halfday'?' selected':'')+'>Half Day</option><option value="leave"'+(l.status==='leave'?' selected':'')+'>Leave</option><option value="holiday"'+(l.status==='holiday'?' selected':'')+'>Holiday (Rest Day)</option><option value="holiday_worked"'+(l.status==='holiday_worked'?' selected':'')+'>Regular Holiday - Worked</option><option value="special_holiday_worked"'+(l.status==='special_holiday_worked'?' selected':'')+'>Special Holiday - Worked</option><option value="wfh"'+(l.status==='wfh'?' selected':'')+'>WFH</option></select></div>';
  body+='<div class="fr"><div class="fi"><label>Time In</label><input id="el-timein" type="time" value="'+esc(l.time_in||'')+'"/></div><div class="fi"><label>Time Out</label><input id="el-timeout" type="time" value="'+esc(l.time_out||'')+'"/></div></div>';
  body+='<div class="fr"><div class="fi"><label>OT Hours</label><input id="el-ot" type="number" step="0.5" value="'+esc(l.ot_hours||0)+'"/></div><div class="fi"><label>Late (min)</label><input id="el-late" type="number" value="'+esc(l.late_minutes||0)+'"/></div></div>';
  body+='<div class="fr"><div class="fi"><label>Holiday Name</label><input id="el-holname" value="'+esc(l.holiday_name||'')+'"/></div><div class="fi"><label>Holiday Type</label><select id="el-holtype"><option value=""'+((!l.holiday_type)?' selected':'')+'>N/A</option><option value="regular"'+(l.holiday_type==='regular'?' selected':'')+'>Regular</option><option value="special"'+(l.holiday_type==='special'?' selected':'')+'>Special</option></select></div></div>';
  body+='<div class="fi"><label>Notes</label><input id="el-notes" value="'+esc(l.notes||'')+'"/></div>';
  mo.innerHTML='<div class="md"><div class="mh"><h2>Edit Log</h2><button class="mc" id="elm-x">&times;</button></div>'+body+'<div class="ma"><button class="bc" id="elm-cancel">Cancel</button><button class="bs" id="elm-save">Save</button></div></div>';
  document.body.appendChild(mo);
  var close=function(){if(mo.parentNode)mo.parentNode.removeChild(mo);};
  mo.querySelector('#elm-x').addEventListener('click',close);mo.querySelector('#elm-cancel').addEventListener('click',close);mo.addEventListener('click',function(e){if(e.target===mo)close();});
  mo.querySelector('#elm-save').addEventListener('click',function(){
    var get=function(i){var e=document.getElementById(i);return e?e.value.trim():'';};
    var data={job_id:get('el-job'),log_date:get('el-date'),status:get('el-status'),time_in:get('el-timein')||null,time_out:get('el-timeout')||null,ot_hours:+get('el-ot')||0,late_minutes:+get('el-late')||0,holiday_name:get('el-holname'),holiday_type:get('el-holtype'),notes:get('el-notes')};
    var idx=attLogs.findIndex(function(x){return x.id===id;});if(idx>=0)attLogs[idx]=Object.assign(attLogs[idx],data);
    db('att_logs?id=eq.'+id,{method:'PATCH',body:JSON.stringify(data)}).catch(function(){});close();renderAtt();
  });
}

// ── MODAL HELPERS ──
function removeMo(){
  var mos=['task-mo','cyc-mo','t12-mo','hab-mo','bl-mo','cal-mo'];
  mos.forEach(function(id){var el=document.getElementById(id);if(el)el.remove();});
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')removeMo();});

// ── SIDEBAR NAV ──
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mob-ov').classList.remove('show');}
document.getElementById('hbtn').addEventListener('click',function(){document.getElementById('sidebar').classList.add('open');document.getElementById('mob-ov').classList.add('show');});
document.getElementById('mob-ov').addEventListener('click',closeSB);
document.querySelectorAll('.ni[data-m]').forEach(function(el){el.addEventListener('click',function(){navigate(el.dataset.m);});});
document.querySelectorAll('.mt[data-m]').forEach(function(el){el.addEventListener('click',function(){navigate(el.dataset.m);});});
document.getElementById('dash-inner').addEventListener('click',function(e){var c=e.target.closest('[data-nav]');if(c&&c.dataset.nav)navigate(c.dataset.nav);});

setInterval(updateDT,60000);
init();
</script>
